<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchiSchedule</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom Scrollbar for sleek UI */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        .dark ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* Link line fade transitions */
        .link-svg-fade {
            transition: opacity 0.25s ease;
        }

        .link-svg-fade.visible {
            opacity: 1;
        }

        .link-svg-fade.hidden {
            opacity: 0;
            pointer-events: none !important;
        }

        /* Hover effect: invisible hit area changes sibling visible path color */
        .link-hit-group:hover .link-visible-path {
            stroke: #f87171 !important;
        }

        .dark .link-hit-group:hover .link-visible-path {
            stroke: #ef4444 !important;
        }

        .dark {
            color-scheme: dark;
        }

        .dark input[type="checkbox"] {
            accent-color: #6366f1;
        }

        /* Robust Checkbox Styling */
        input[type="checkbox"].custom-checkbox {
            appearance: none;
            -webkit-appearance: none;
            background-color: #fff;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .dark input[type="checkbox"].custom-checkbox {
            background-color: #1e293b;
            border-color: #475569;
        }

        input[type="checkbox"].custom-checkbox:checked {
            background-color: #6366f1;
            border-color: #6366f1;
        }

        input[type="checkbox"].custom-checkbox:checked::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 45%;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: translate(-50%, -50%) rotate(45deg);
        }

        input[type="checkbox"].custom-checkbox:focus {
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
            border-color: #6366f1;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        // --- Icon Wrapper ---
        const Icon = ({ name, className, ...rest }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    ref.current.innerHTML = `<i data-lucide="${name}" class="${className || ''}"></i>`;
                    window.lucide.createIcons({ root: ref.current });
                }
            }, [name, className]);
            return <span ref={ref} {...rest} style={{ display: 'contents' }} />;
        };

        const ChevronRight = (p) => <Icon name="chevron-right" {...p} />;
        const ChevronDown = (p) => <Icon name="chevron-down" {...p} />;
        const Plus = (p) => <Icon name="plus" {...p} />;
        const Trash2 = (p) => <Icon name="trash-2" {...p} />;
        const Filter = (p) => <Icon name="filter" {...p} />;
        const Flag = (p) => <Icon name="flag" {...p} />;
        const Briefcase = (p) => <Icon name="briefcase" {...p} />;
        const AlertCircle = (p) => <Icon name="alert-circle" {...p} />;
        const CalendarDays = (p) => <Icon name="calendar-days" {...p} />;
        const BriefcaseBusiness = (p) => <Icon name="briefcase-business" {...p} />;
        const Moon = (p) => <Icon name="moon" {...p} />;
        const Sun = (p) => <Icon name="sun" {...p} />;
        const Download = (p) => <Icon name="download" {...p} />;
        const Copy = (p) => <Icon name="copy" {...p} />;
        const Folder = (p) => <Icon name="folder" {...p} />;
        const FileIcon = (p) => <Icon name="file" {...p} />;
        const X = (p) => <Icon name="x" {...p} />;
        const FileText = (p) => <Icon name="file-text" {...p} />;
        const FileSpreadsheet = (p) => <Icon name="file-spreadsheet" {...p} />;
        const Edit2 = (p) => <Icon name="edit-2" {...p} />;
        const FilePlus = (p) => <Icon name="file-plus" {...p} />;
        const Upload = (p) => <Icon name="upload" {...p} />;
        const Calendar = (p) => <Icon name="calendar" {...p} />;
        const Presentation = (p) => <Icon name="presentation" {...p} />;
        const LayoutDashboard = (p) => <Icon name="layout-dashboard" {...p} />;
        const Loader2 = (p) => <Icon name="loader-2" {...p} />;
        const ListTree = (p) => <Icon name="list-tree" {...p} />;
        const Eye = (p) => <Icon name="eye" {...p} />;
        const AlignLeft = (p) => <Icon name="align-left" {...p} />;
        const StickyNote = (p) => <Icon name="sticky-note" {...p} />;
        const Undo2 = (p) => <Icon name="undo-2" {...p} />;
        const Redo2 = (p) => <Icon name="redo-2" {...p} />;
        const Users2 = (p) => <Icon name="users-2" {...p} />;
        const Users = (p) => <Icon name="users" {...p} />;
        const Clock = (p) => <Icon name="clock" {...p} />;
        const CheckCircle2 = (p) => <Icon name="check-circle-2" {...p} />;
        const AlertTriangle = (p) => <Icon name="alert-triangle" {...p} />;


        // --- Date Utilities ---
        const parseDate = (str) => new Date(str + 'T12:00:00Z');
        const isValidDateStr = (str) => { if (!str) return false; return !isNaN(parseDate(str).getTime()); };

        const formatShortDate = (dateStr) => {
            if (!isValidDateStr(dateStr)) return '';
            const d = parseDate(dateStr);
            return `${String(d.getUTCMonth() + 1).padStart(2, '0')}/${String(d.getUTCDate()).padStart(2, '0')}/${String(d.getUTCFullYear()).slice(2)}`;
        };

        const parseShortDate = (str) => {
            if (!str) return '';
            const parts = str.split('/');
            if (parts.length !== 3) return '';
            const [mm, dd, yy] = parts;
            const m = parseInt(mm, 10), d = parseInt(dd, 10), y = parseInt(yy, 10);
            if (isNaN(m) || isNaN(d) || isNaN(y)) return '';
            const result = `${String(y + 2000)}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            return isValidDateStr(result) ? result : '';
        };

        const formatDayMonth = (dateStr) => {
            if (!isValidDateStr(dateStr)) return '';
            const d = parseDate(dateStr);
            return `${String(d.getUTCMonth() + 1).padStart(2, '0')}/${String(d.getUTCDate()).padStart(2, '0')}`;
        };

        const getUSFederalHolidaysForYear = (year) => {
            const h = [];
            const addHoliday = (m, d) => h.push(`${year}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`);
            addHoliday(1, 1);
            let dt = new Date(Date.UTC(year, 0, 1)); addHoliday(1, 1 + (8 - dt.getUTCDay()) % 7 + 14);
            dt = new Date(Date.UTC(year, 1, 1)); addHoliday(2, 1 + (8 - dt.getUTCDay()) % 7 + 14);
            dt = new Date(Date.UTC(year, 4, 31)); addHoliday(5, 31 - ((dt.getUTCDay() + 6) % 7));
            addHoliday(6, 19);
            addHoliday(7, 4);
            dt = new Date(Date.UTC(year, 8, 1)); const labOff = (8 - dt.getUTCDay()) % 7; addHoliday(9, labOff === 0 ? 7 : labOff);
            dt = new Date(Date.UTC(year, 9, 1)); addHoliday(10, 1 + (8 - dt.getUTCDay()) % 7 + 7);
            addHoliday(11, 11);
            dt = new Date(Date.UTC(year, 10, 1)); addHoliday(11, 1 + (11 - dt.getUTCDay()) % 7 + 21);
            addHoliday(12, 25);
            return h;
        };
        const generateHolidays = () => {
            let arr = [];
            for (let y = 2020; y <= 2040; y++) arr.push(...getUSFederalHolidaysForYear(y));
            return arr;
        };
        const HOLIDAYS = generateHolidays();

        const addDays = (dateStr, days) => {
            const d = parseDate(dateStr);
            d.setUTCDate(d.getUTCDate() + parseInt(days, 10));
            return d.toISOString().split('T')[0];
        };

        const diffDays = (startStr, endStr) => {
            const start = parseDate(startStr);
            const end = parseDate(endStr);
            return Math.round((end - start) / (1000 * 60 * 60 * 24));
        };

        const isWeekend = (date) => date.getUTCDay() === 0 || date.getUTCDay() === 6;
        const isHoliday = (dateStr) => {
            const extra = window._activeHolidays || [];
            if (HOLIDAYS.includes(dateStr)) return true;

            for (let i = 0; i < extra.length; i++) {
                const h = extra[i];
                if (typeof h === 'string') {
                    if (h === dateStr) return true;
                } else if (h.start && h.end) {
                    if (dateStr >= h.start && dateStr <= h.end) return true;
                }
            }
            return false;
        };
        const isNonWorkingDay = (dateStr, type) => {
            if (type === 'Calendar') return false;
            return isWeekend(parseDate(dateStr)) || isHoliday(dateStr);
        };

        const calculateEndDate = (startStr, durationInDays, type) => {
            let dur = Math.max(1, durationInDays);
            if (type === 'Calendar') return addDays(startStr, dur - 1);
            let current = parseDate(startStr);
            let added = 0;
            while (added < dur) {
                const dStr = current.toISOString().split('T')[0];
                if (!isWeekend(current) && !isHoliday(dStr)) added++;
                if (added < dur) current.setUTCDate(current.getUTCDate() + 1);
            }
            return current.toISOString().split('T')[0];
        };

        const getDurationBetweenDates = (startStr, endStr, type) => {
            let current = parseDate(startStr);
            const end = parseDate(endStr);
            if (current > end) return 1;
            let days = 0;
            while (current <= end) {
                const dStr = current.toISOString().split('T')[0];
                if (type === 'Calendar' || (!isWeekend(current) && !isHoliday(dStr))) days++;
                current.setUTCDate(current.getUTCDate() + 1);
            }
            return Math.max(1, days);
        };

        const recalculateSchedule = (currentTasks, type) => {
            let updated = JSON.parse(JSON.stringify(currentTasks));
            let changed = true;
            let iterations = 0;
            while (changed && iterations < 100) {
                changed = false;
                iterations++;
                for (let i = 0; i < updated.length; i++) {
                    let task = updated[i];
                    if (task.deps && task.deps.length > 0) {
                        let maxEndStr = '1970-01-01';
                        task.deps.forEach(depId => {
                            const depTask = updated.find(t => t.id === depId);
                            if (depTask) {
                                let depEnd = calculateEndDate(depTask.start, depTask.duration, type);
                                if (!task.milestone) {
                                    depEnd = addDays(depEnd, 1);
                                    if (type === 'Business') {
                                        while (isNonWorkingDay(depEnd, type)) depEnd = addDays(depEnd, 1);
                                    }
                                }
                                if (depEnd > maxEndStr) maxEndStr = depEnd;
                            }
                        });
                        if (task.start !== maxEndStr) {
                            task.start = maxEndStr;
                            changed = true;
                        }
                    }
                }
            }
            return updated;
        };

        const getEarliestAndLatestDates = (tasks, type) => {
            if (tasks.length === 0) return { start: parseDate(new Date().toISOString().split('T')[0]), end: parseDate(addDays(new Date().toISOString().split('T')[0], 30)) };
            let earliestStr = tasks[0].start;
            let latestStr = calculateEndDate(tasks[0].start, tasks[0].duration, type);
            tasks.forEach(t => {
                if (t.start < earliestStr) earliestStr = t.start;
                const e = calculateEndDate(t.start, t.duration, type);
                if (e > latestStr) latestStr = e;
            });
            const earliest = parseDate(earliestStr);
            const latest = parseDate(latestStr);
            earliest.setUTCDate(earliest.getUTCDate() - 7);
            latest.setUTCDate(latest.getUTCDate() + 21);
            return { start: earliest, end: latest };
        };

        const generateICS = (tasks) => {
            const milestones = tasks.filter(t => t.milestone > 0);
            let ics = 'BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//ArchiSchedule//EN\n';
            milestones.forEach(m => {
                const start = m.start.replace(/-/g, '') + 'T090000Z';
                const end = m.start.replace(/-/g, '') + 'T100000Z';
                ics += 'BEGIN:VEVENT\n';
                ics += `DTSTART:${start}\n`;
                ics += `DTEND:${end}\n`;
                ics += `SUMMARY:Milestone: ${m.name}\n`;
                ics += `DESCRIPTION:Phase: ${m.phase}\\nParty: ${m.party}\n`;
                ics += 'END:VEVENT\n';
            });
            ics += 'END:VCALENDAR';
            return ics;
        };

        const loadScript = (src) => {
            return new Promise((resolve, reject) => {
                if (document.querySelector(`script[src="${src}"]`)) return resolve();
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        };

        const INITIAL_PHASES = ['Pre-Design', 'Schematic Design', 'Design Development', 'Construction Documents', 'Permitting', 'Bidding', 'Construction Admin'];
        const DEFAULT_PARTIES = ['Architect', 'Client', 'Structural', 'MEP', 'Civil', 'Landscape', 'Municipality', 'Contractor'];
        const INITIAL_PHASE_COLORS = { 'Pre-Design': '#64748b', 'Schematic Design': '#3b82f6', 'Design Development': '#6366f1', 'Construction Documents': '#7c3aed', 'Permitting': '#f97316', 'Bidding': '#f59e0b', 'Construction Admin': '#059669' };
        const INITIAL_PHASE_PARENTS = {};
        const INITIAL_TASKS = [
            { id: '1', name: 'Project Kickoff', phase: 'Pre-Design', party: 'All', start: '2026-03-02', duration: 1, milestone: 1, deps: [] },
            { id: '2', name: 'Site Survey & Scanning', phase: 'Pre-Design', party: 'Civil', start: '2026-03-03', duration: 10, milestone: 0, deps: ['1'] },
            { id: '3', name: 'Zoning Analysis', phase: 'Pre-Design', party: 'Architect', start: '2026-03-03', duration: 5, milestone: 0, deps: ['1'] },
            { id: '4', name: 'Concept Sketches', phase: 'Schematic Design', party: 'Architect', start: '2026-03-17', duration: 14, milestone: 0, deps: ['2', '3'] },
            { id: '5', name: 'Owner Concept Review', phase: 'Schematic Design', party: 'Client', start: '2026-04-06', duration: 1, milestone: 2, deps: ['4'] },
        ];

        function App() {
            const [viewMode, setViewMode] = useState(() => localStorage.getItem('archiViewMode') || 'Business');
            const durationType = 'Business'; // Core engine always uses Business days to prevent destructive schedule shifts

            const [projects, setProjects] = useState(() => {
                try {
                    const saved = localStorage.getItem('archiScheduleData');
                    if (saved) return JSON.parse(saved);
                } catch (e) { console.error("Load failed", e); }
                return [{
                    id: 'p1', name: 'Sample Architecture Project', clientName: '',
                    parties: DEFAULT_PARTIES,
                    versions: [{ id: 'v1', name: 'Base Schedule', tasks: INITIAL_TASKS, phases: INITIAL_PHASES, phaseColors: INITIAL_PHASE_COLORS, phaseParents: INITIAL_PHASE_PARENTS }]
                }];
            });

            // --- Undo / Redo History (dual-stack) ---
            const undoStackRef = useRef([]);  // states BEFORE each action
            const redoStackRef = useRef([]);  // states that were undone
            const isUndoRedoRef = useRef(false); // suppress history push during travel
            const projectsRef = useRef(projects); // always holds the latest projects value

            // Keep projectsRef in sync with state
            useEffect(() => { projectsRef.current = projects; }, [projects]);

            // Call this instead of setProjects for all undoable mutations.
            // Saves the current `projects` snapshot before applying the updater.
            const pushHistory = useCallback((updaterOrValue) => {
                if (!isUndoRedoRef.current) {
                    undoStackRef.current = [...undoStackRef.current.slice(-99), JSON.parse(JSON.stringify(projectsRef.current))];
                    redoStackRef.current = []; // clear redo on new action
                }
                setProjects(prev => typeof updaterOrValue === 'function' ? updaterOrValue(prev) : updaterOrValue);
            }, []);
            const [activeProjectId, setActiveProjectId] = useState(() => localStorage.getItem('archiActiveP') || 'p1');
            const [activeVersionId, setActiveVersionId] = useState(() => localStorage.getItem('archiActiveV') || 'v1');

            const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('archiDarkMode') === 'true');
            const [layoutView, setLayoutView] = useState(() => localStorage.getItem('archiLayout') || 'Gantt');
            const [showTimelineTasks, setShowTimelineTasks] = useState(() => localStorage.getItem('archiShowTasks') === 'true');
            const [alwaysShowTaskNames, setAlwaysShowTaskNames] = useState(() => localStorage.getItem('archiShowNames') === 'true');

            const [showExportModal, setShowExportModal] = useState(false);
            const [isExporting, setIsExporting] = useState(false);

            const [showViewModal, setShowViewModal] = useState(false);
            const [rowHeight, setRowHeight] = useState(() => parseInt(localStorage.getItem('archiRowHeight')) || 30);
            const [textSize, setTextSize] = useState(() => parseInt(localStorage.getItem('archiTextSize')) || 13);
            const [columnVisibility, setColumnVisibility] = useState(() => {
                try { const s = localStorage.getItem('archiColVis'); if (s) return JSON.parse(s); } catch (e) { }
                return { phasePercentage: true, party: true, duration: true, start: true, end: true };
            });
            const [columnOrder, setColumnOrder] = useState(() => {
                try {
                    const s = localStorage.getItem('archiColOrder');
                    if (s) return JSON.parse(s);
                } catch (e) { }
                return ['name', 'phasePercentage', 'party', 'duration', 'start', 'end'];
            });
            const [pdfPaperSize, setPdfPaperSize] = useState(() => localStorage.getItem('archiPdfSize') || 'letter');
            const [companyLogo, setCompanyLogo] = useState(() => localStorage.getItem('archiCompanyLogo') || '');
            const [companyName, setCompanyName] = useState(() => localStorage.getItem('archiCompanyName') || '');
            const [companyFooter, setCompanyFooter] = useState(() => localStorage.getItem('archiCompanyFooter') || '');
            const [showConfidential, setShowConfidential] = useState(() => localStorage.getItem('archiConfidential') === 'true');
            const [showCriticalPath, setShowCriticalPath] = useState(() => localStorage.getItem('archiCriticalPath') === 'true');
            const [selectedParties, setSelectedParties] = useState(() => {
                const s = localStorage.getItem('archiSelectedParties');
                return s ? JSON.parse(s) : [];
            });
            const [partyHighlightMode, setPartyHighlightMode] = useState(() => localStorage.getItem('archiPartyHighlight') === 'true');
            const [showDashboard, setShowDashboard] = useState(() => localStorage.getItem('archiShowDashboard') !== 'false');


            const [contextMenu, setContextMenu] = useState(null); // { x, y, taskId }
            const [renameModal, setRenameModal] = useState(null);
            const [showShiftModal, setShowShiftModal] = useState(false);
            const [showHolidaysModal, setShowHolidaysModal] = useState(false);
            const [shiftTarget, setShiftTarget] = useState('All');
            const [shiftMode, setShiftMode] = useState('days'); // 'days' or 'date'
            const [shiftDays, setShiftDays] = useState(0);
            const [shiftDate, setShiftDate] = useState('');
            const [notesPopover, setNotesPopover] = useState(null); // { taskId, x, y }
            const [showPartyModal, setShowPartyModal] = useState(false);
            const [editingPartyName, setEditingPartyName] = useState(null); // { oldName, tempName }
            const [selectedTaskIds, setSelectedTaskIds] = useState(new Set());


            const activeProject = projects.find(p => p.id === activeProjectId) || projects[0];
            const activeVersion = activeProject.versions.find(v => v.id === activeVersionId) || activeProject.versions[0];
            window._activeHolidays = activeProject.customHolidays || [];
            const tasks = activeVersion.tasks || [];
            const phases = activeVersion.phases || [];
            const phaseColors = activeVersion.phaseColors || {};
            const phaseParents = activeVersion.phaseParents || {};

            const criticalPathIds = useMemo(() => {
                if (!showCriticalPath || tasks.length === 0) return new Set();
                const taskMap = {};
                const ef = {};
                tasks.forEach(t => {
                    taskMap[t.id] = t;
                    ef[t.id] = calculateEndDate(t.start, t.duration, 'Business');
                });

                const projectEnd = Object.values(ef).reduce((max, end) => end > max ? end : max, '0000-00-00');
                if (projectEnd === '0000-00-00') return new Set();

                const successors = {};
                tasks.forEach(t => {
                    t.deps.forEach(depId => {
                        if (!successors[depId]) successors[depId] = [];
                        successors[depId].push(t.id);
                    });
                });

                const lf = {};
                const getLateFinish = (id) => {
                    if (lf[id]) return lf[id];
                    const sucs = successors[id] || [];
                    if (sucs.length === 0) {
                        return lf[id] = projectEnd;
                    }
                    let minLS = '9999-12-31';
                    sucs.forEach(sucId => {
                        const suc = taskMap[sucId];
                        // LS of successor is the date such that calculateEndDate(LS, dur) = EF_of_successor
                        // Wait, it's simpler: LS = suc.start. 
                        // Because recalculateSchedule already set suc.start to the earliest possible start based on deps.
                        if (suc.start < minLS) minLS = suc.start;
                    });

                    // Late Finish of current task is minLS - 1 day (adjusted for business days)
                    let latestFinish = addDays(minLS, -1);
                    while (isNonWorkingDay(latestFinish, 'Business')) latestFinish = addDays(latestFinish, -1);
                    return lf[id] = latestFinish;
                };

                const critical = new Set();
                tasks.forEach(t => {
                    const lateFinish = getLateFinish(t.id);
                    const earlyFinish = ef[t.id];
                    if (earlyFinish >= lateFinish) {
                        critical.add(t.id);
                    }
                });
                return critical;
            }, [tasks, showCriticalPath]);

            const healthMetrics = useMemo(() => {
                if (!tasks || tasks.length === 0) return null;

                // Duration calculation - use actual project span
                let minDate = tasks[0].start;
                let maxDate = calculateEndDate(tasks[0].start, tasks[0].duration, durationType);
                tasks.forEach(t => {
                    const end = calculateEndDate(t.start, t.duration, durationType);
                    if (t.start < minDate) minDate = t.start;
                    if (end > maxDate) maxDate = end;
                });
                const totalDur = getDurationBetweenDates(minDate, maxDate, durationType);

                // Task vs Milestone Breakdown
                const taskCount = tasks.filter(t => t.milestone === 0).length;
                const milestoneCount = tasks.filter(t => t.milestone > 0).length;

                // Critical Path Index
                const criticalCount = tasks.filter(t => criticalPathIds.has(t.id)).length;
                const criticalityIndex = tasks.length > 0 ? Math.round((criticalCount / tasks.length) * 100) : 0;

                // Upcoming Milestones (14 days)
                const todayStr = new Date().toISOString().split('T')[0];
                const horizonStr = addDays(todayStr, 14);
                const upcomingMilestones = tasks.filter(t => t.milestone > 0 && t.start >= todayStr && t.start <= horizonStr).length;

            const timelineBoundsStartStr = timelineBounds.start.toISOString().split('T')[0];

            const timelineHeaders = useMemo(() => {
                const headers = { months: [], weeks: [], days: [] };

                for (let i = 0; i <= totalDays; i++) {
                    const d = parseDate(timelineBoundsStartStr);
                    d.setUTCDate(d.getUTCDate() + i);
                    const dStr = d.toISOString().split('T')[0];
                    headers.days.push({ offset: i, date: d, str: dStr, isWeekend: isWeekend(d), isHoliday: isHoliday(dStr) });
                    if (d.getUTCDay() === 1 || i === 0) headers.weeks.push({ dayOffset: i, date: d });

                    if (d.getUTCMonth() !== currentMonth || i === totalDays) {
                        headers.months.push({ name: d.toLocaleString('default', { month: 'long', year: 'numeric', timeZone: 'UTC' }), start: monthStartDay, width: i - monthStartDay });

                    const offStart = diffDays(timelineBoundsStartStr, minS);

                    let startMonthCol = 8;
                    timelineHeaders.days.forEach((d, i) => {
                        const mStr = d.date.toLocaleString('default', { month: 'short', timeZone: 'UTC' }) + " '" + d.date.getUTCFullYear().toString().slice(-2);
                        if (mStr !== currentMonth || i === timelineHeaders.days.length - 1) {
                            if (currentMonth !== "") {
                                const endCol = i === timelineHeaders.days.length - 1 ? 7 + i + 1 : 7 + i;
                                if (endCol > startMonthCol) {
                                    worksheet.mergeCells(5, startMonthCol, 5, endCol - 1);
                                    const mCell = worksheet.getCell(5, startMonthCol);
                                    mCell.value = currentMonth;
                                    mCell.font = { name: 'Segoe UI', size: 9, bold: true, color: { argb: 'FF475569' } };
                                    mCell.alignment = { horizontal: 'center', vertical: 'middle' };
                                    mCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF1F5F9' } };
                                    mCell.border = {
                                        top: { style: 'thin', color: { argb: 'FFCBD5E1' } },
                                        bottom: { style: 'thin', color: { argb: 'FFCBD5E1' } },
                                        left: { style: 'thin', color: { argb: 'FFCBD5E1' } },
                                        right: { style: 'thin', color: { argb: 'FFCBD5E1' } }
                                    };
                                }
                            }
                            currentMonth = mStr;
                            startMonthCol = 7 + i + 1;
                        }
                    });

                    // Add Holidays Sheet
                    const holidaySheet = workbook.addWorksheet('Holidays', { state: 'hidden' });
                    holidaySheet.getCell('A1').value = 'Holiday Date';
                    holidaySheet.getCell('A1').font = { bold: true };
                    HOLIDAYS.forEach((h, idx) => {
                        holidaySheet.getCell(`A${idx + 2}`).value = toExcelDate(h);
                        holidaySheet.getCell(`A${idx + 2}`).numFmt = 'mm/dd/yyyy';
                    });
                    const holidaysRange = `Holidays!$A$2:$A$${HOLIDAYS.length + 1}`;

                    let currentRowNum = 7;
                    const taskIdToRowMap = {};

                    // First pass to assign row numbers to tasks
                    flattenedPhases.forEach(fp => {
                        const p = fp.phase;
                        if (!tasksByPhase[p] || tasksByPhase[p].length === 0) return;
                        currentRowNum++; // Phase row
                        tasksByPhase[p].forEach(t => {
                            taskIdToRowMap[t.id] = currentRowNum;
                            currentRowNum++; // Task row
                        });
                    });

                    currentRowNum = 7;

                    flattenedPhases.forEach(fp => {
                        const p = fp.phase;
                        const level = fp.level;
                        if (!tasksByPhase[p] || tasksByPhase[p].length === 0) return;

                        const phaseRow = worksheet.getRow(currentRowNum);
                        phaseRow.height = 28;
                        const indentStr = '  '.repeat(level);
                        phaseRow.getCell(1).value = indentStr + p;
                        phaseRow.getCell(1).font = { name: 'Segoe UI', size: 11, bold: true, color: { argb: 'FF0F172A' } };
                        phaseRow.getCell(1).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF1F5F9' } };
                        worksheet.mergeCells(currentRowNum, 1, currentRowNum, 7);

                        for (let i = 1; i <= 7; i++) {
                            phaseRow.getCell(i).border = { bottom: { style: 'thin', color: { argb: 'FFCBD5E1' } } };
                        }

                        // Apply weekend borders to phase row timeline
                        for (let col = 8; col <= 7 + timelineHeaders.days.length; col++) {
                            const isH = timelineHeaders.days[col - 8].isHoliday;
                            const isW = timelineHeaders.days[col - 8].isWeekend;
                            phaseRow.getCell(col).border = { bottom: { style: 'thin', color: { argb: 'FFCBD5E1' } } };
                            if (isH || isW) phaseRow.getCell(col).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: isH ? 'FFFEE2E2' : 'FFF1F5F9' } };
                        }

                        currentRowNum++;

                        tasksByPhase[p].forEach(t => {
                            const row = worksheet.getRow(currentRowNum);
                            row.height = 24;

                            const isMS = t.milestone > 0;
                            row.getCell(1).value = p;
                            row.getCell(1).font = { color: { argb: 'FFFFFFFF' } }; // Invisible phase name for filtering

                            row.getCell(2).value = t.name;
                            row.getCell(2).font = { name: 'Segoe UI', size: 10, bold: isMS, color: { argb: isMS ? (t.milestone === 2 ? 'FF059669' : 'FFD97706') : 'FF334155' } };
                            row.getCell(2).alignment = { indent: 1, vertical: 'middle' };

                            row.getCell(3).value = t.party;
                            row.getCell(3).font = { name: 'Segoe UI', size: 10 };
                            row.getCell(3).alignment = { vertical: 'middle' };

                            // Predecessors logic
                            const depsRows = (t.deps || []).map(depId => taskIdToRowMap[depId]).filter(r => r);
                            const depsCell = row.getCell(4);
                            depsCell.value = depsRows.join(', ');
                            depsCell.font = { name: 'Segoe UI', size: 10 };
                            depsCell.alignment = { horizontal: 'center', vertical: 'middle' };

                            const durCell = row.getCell(5);
                            if (isMS) {
                                durCell.value = 'M';
                            } else {
                                let exportDur = t.duration;
                                if (viewMode === 'Weeks') exportDur = Math.ceil(t.duration / 5);
                                else if (viewMode === 'Days') exportDur = getDurationBetweenDates(t.start, calculateEndDate(t.start, t.duration, 'Business'), 'Calendar');
                                durCell.value = exportDur;
                                durCell.dataValidation = { type: 'whole', operator: 'greaterThan', formula1: 0, showErrorMessage: true, errorTitle: 'Invalid Duration', error: 'Duration must be > 0' };
                            }
                            durCell.alignment = { horizontal: 'center', vertical: 'middle' };
                            durCell.font = { name: 'Segoe UI', size: 10 };

                            const startCell = row.getCell(6);
                            if (depsRows.length > 0) {
                                // Dynamic Start Date based on max end date of predecessors
                                const formulas = depsRows.map(r => `G${r}`);
                                if (isMS) {
                                    // Milestones happen exactly on the predecessor's end date
                                    startCell.value = { formula: `MAX(${formulas.join(',')})` };
                                } else {
                                    if (viewMode === 'Weeks' || durationType === 'Calendar') {
                                        startCell.value = { formula: `MAX(${formulas.join(',')}) + 1` };
                                    } else {
                                        // For business days, ensure start date falls on a workday
                                        startCell.value = { formula: `WORKDAY(MAX(${formulas.join(',')}), 1, ${holidaysRange})` };
                                    }
                                }
                            } else {
                                startCell.value = toExcelDate(t.start);
                            }
                            startCell.numFmt = 'mm/dd/yyyy';
                            startCell.font = { name: 'Segoe UI', size: 10 };
                            startCell.alignment = { vertical: 'middle' };

                            const endCell = row.getCell(7);
                            if (isMS) {
                                endCell.value = { formula: `F${currentRowNum}` };
                            } else {
                                if (viewMode === 'Weeks') {
                                    endCell.value = { formula: `WORKDAY(F${currentRowNum}-1, E${currentRowNum}*5, ${holidaysRange})` };
                                } else if (viewMode === 'Days') {
                                    endCell.value = { formula: `F${currentRowNum}+E${currentRowNum}-1` };
                                } else {
                                    endCell.value = { formula: `WORKDAY(F${currentRowNum}-1, E${currentRowNum}, ${holidaysRange})` };
                                }
                            }
                            endCell.numFmt = 'mm/dd/yyyy';
                            endCell.font = { name: 'Segoe UI', size: 10, color: { argb: 'FF64748B' } };
                            endCell.alignment = { vertical: 'middle' };
                            if (!isMS) endCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF8FAFC' } };

                            for (let i = 1; i <= 7; i++) {
                                row.getCell(i).border = {
                                    bottom: { style: 'thin', color: { argb: 'FFF1F5F9' } },
                                    right: i === 7 ? { style: 'thin', color: { argb: 'FFCBD5E1' } } : undefined
                                };
                            }

                            // Weekend data rows
                            for (let col = 8; col <= 7 + timelineHeaders.days.length; col++) {
                                const isH = timelineHeaders.days[col - 8].isHoliday;
                                const isW = timelineHeaders.days[col - 8].isWeekend;
                                const cell = row.getCell(col);

                                cell.border = {
                                    bottom: { style: 'thin', color: { argb: 'FFF1F5F9' } },
                                    right: { style: 'thin', color: { argb: 'FFF8FAFC' } }
                                };

                                if (isH || isW) {
                                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: isH ? 'FFFEE2E2' : 'FFF1F5F9' } };
                                    cell.border = {
                                        left: { style: 'thin', color: { argb: 'FFE2E8F0' } },
                                        right: { style: 'thin', color: { argb: 'FFE2E8F0' } },
                                        bottom: { style: 'thin', color: { argb: 'FFF1F5F9' } }
                                    };
                                }
                            }

                            row.outlineLevel = 1;
                            currentRowNum++;
                        });
                    });

                    const startDataRow = 7;
                    const endDataRow = currentRowNum - 1;

                    const cfcStartColLexer = getColLetter(8);
                    const cfcEndColLexer = getColLetter(7 + timelineHeaders.days.length);

                    if (endDataRow >= startDataRow && timelineHeaders.days.length > 0) {
                        const gridRange = `${cfcStartColLexer}${startDataRow}:${cfcEndColLexer}${endDataRow}`;

                        const rules = [];

                        // Today Line Configuration
                        if (showTodayLine) {
                            const todayDate = new Date().toISOString().split('T')[0];
                            // Apply formatting across the entire column if top header matches today
                            rules.push({
                                priority: 6, // High priority
                                type: 'expression',
                                formulae: [`${cfcStartColLexer}$6=DATEVALUE("${toExcelDate(todayDate).toLocaleDateString()}")`],
                                style: {
                                    border: {
                                        left: { style: 'medium', color: { argb: 'FFEF4444' } },
                                        right: { style: 'medium', color: { argb: 'FFEF4444' } }
                                    },
                                    fill: { type: 'pattern', pattern: 'solid', bgColor: { argb: 'FFFEF2F2' } }
                                }
                            });
                        }

                        // 1. Phases
                        visiblePhases.forEach(p => {
                            const phaseColorArgb = hexToArgb(phaseColors[p] || '#94a3b8');
                            // Create a slightly more transparent look for the fill
                            rules.push({
                                priority: 5, // Lower priority than tasks/milestones
                                type: 'expression',
                                formulae: [`AND($A7="${p.replace(/"/g, '""')}", ${cfcStartColLexer}$6>=$F7, ${cfcStartColLexer}$6<=$G7)`],
                                style: {
                                    fill: { type: 'pattern', pattern: 'solid', bgColor: { argb: phaseColorArgb } },
                                    border: {
                                        top: { style: 'thin', color: { argb: phaseColorArgb } },
                                        bottom: { style: 'thin', color: { argb: phaseColorArgb } }
                                    }
                                }
                            });
                        });

                        // 2. Milestones (General)
                        rules.push({
                            priority: 2,
                            type: 'expression',
                            formulae: [`AND(${cfcStartColLexer}$6>=$F7,${cfcStartColLexer}$6<=$G7,$E7="M")`],
                            style: {
                                fill: { type: 'pattern', pattern: 'solid', bgColor: { argb: 'FFD97706' } }, // amber-600
                                border: { top: { style: 'medium', color: { argb: 'FFB45309' } }, bottom: { style: 'medium', color: { argb: 'FFB45309' } }, left: { style: 'medium', color: { argb: 'FFB45309' } }, right: { style: 'medium', color: { argb: 'FFB45309' } } }
                            }
                        });

                        // 3. Owner Milestones (Specific)
                        rules.push({
                            priority: 1,
                            type: 'expression',
                            formulae: [`AND(${cfcStartColLexer}$6>=$F7,${cfcStartColLexer}$6<=$G7,$E7="M", $C7="Owner")`],
                            style: {
                                fill: { type: 'pattern', pattern: 'solid', bgColor: { argb: 'FF059669' } }, // emerald-600
                                border: { top: { style: 'medium', color: { argb: 'FF047857' } }, bottom: { style: 'medium', color: { argb: 'FF047857' } }, left: { style: 'medium', color: { argb: 'FF047857' } }, right: { style: 'medium', color: { argb: 'FF047857' } } }
                            }
                        });

                        // 4. Custom Colored Tasks and Milestones
                        let currentTaskRowIndex = startDataRow;
                        flattenedPhases.forEach(fp => {
                            const p = fp.phase;
                            if (!tasksByPhase[p] || tasksByPhase[p].length === 0) return;
                            // Skip phase header row
                            currentTaskRowIndex++;
                            const pTasks = tasksByPhase[p];
                            if (pTasks) {
                                pTasks.forEach(t => {
                                    if (t.color) {
                                        const argbColor = 'FF' + t.color.replace('#', '').toUpperCase();
                                        rules.push({
                                            priority: 0, // Highest priority
                                            type: 'expression',
                                            formulae: [`AND(ROW()=${currentTaskRowIndex}, ${cfcStartColLexer}$6>=$F${currentTaskRowIndex}, ${cfcStartColLexer}$6<=$G${currentTaskRowIndex})`],
                                            style: {
                                                fill: { type: 'pattern', pattern: 'solid', bgColor: { argb: argbColor } },
                                                border: { top: { style: 'thin', color: { argb: argbColor } }, bottom: { style: 'thin', color: { argb: argbColor } } }
                                            }
                                        });
                                    }
                                    currentTaskRowIndex++;
                                });
                            }
                        });

                        // 5. Default Task Bar
                        rules.push({
                            priority: 3,
                            type: 'expression',
                            formulae: [`AND(${cfcStartColLexer}$6>=$F7,${cfcStartColLexer}$6<=$G7,$E7<>"M")`],
                            style: {
                                fill: { type: 'pattern', pattern: 'solid', bgColor: { argb: 'FF94A3B8' } }, // slate-400
                                border: { top: { style: 'thin', color: { argb: 'FF64748B' } }, bottom: { style: 'thin', color: { argb: 'FF64748B' } } }
                            }
                        });

                        worksheet.addConditionalFormatting({
                            ref: gridRange,
                            rules: rules
                        });
                    }

                    // Create Static Data Sheet
                    const staticSheet = workbook.addWorksheet('Static Data');
                    staticSheet.columns = [
                        { header: 'Phase', key: 'phase', width: 25 },
                        { header: 'Task Name', key: 'name', width: 35 },
                        { header: 'Party', key: 'party', width: 15 },
                        { header: 'Predecessors', key: 'deps', width: 20 },
                        { header: 'Duration', key: 'duration', width: 10 },
                        { header: 'Start Date', key: 'start', width: 15 },
                        { header: 'End Date', key: 'end', width: 15 },
                    ];

                    const staticHeaderRow = staticSheet.getRow(1);
                    staticHeaderRow.font = { name: 'Segoe UI', size: 10, bold: true, color: { argb: 'FF334155' } };
                    staticHeaderRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF8FAFC' } };
                    for (let i = 1; i <= 7; i++) {
                        staticHeaderRow.getCell(i).border = { bottom: { style: 'thin', color: { argb: 'FFCBD5E1' } } };
                    }

                    flattenedPhases.forEach(fp => {
                        const p = fp.phase;
                        if (!tasksByPhase[p]) return;
                        tasksByPhase[p].forEach(t => {
                            const isMS = t.milestone > 0;
                            let exportDur = isMS ? 'M' : t.duration;
                            if (!isMS) {
                                if (viewMode === 'Weeks') exportDur = Math.ceil(t.duration / 5);
                                else if (viewMode === 'Days') exportDur = getDurationBetweenDates(t.start, calculateEndDate(t.start, t.duration, 'Business'), 'Calendar');
                            }

                            const depsNames = (t.deps || []).map(depId => {
                                const dep = filteredTasks.find(dt => dt.id === depId);
                                return dep ? dep.name : '';
                            }).filter(n => n).join(', ');

                            const newRow = staticSheet.addRow({
                                phase: p,
                                name: t.name,
                                party: t.party,
                                deps: depsNames,
                                duration: exportDur,
                                start: toExcelDate(t.start),
                                end: toExcelDate(calculateEndDate(t.start, t.duration, durationType))
                            });
                            newRow.font = { name: 'Segoe UI', size: 10 };
                            newRow.getCell(6).numFmt = 'mm/dd/yyyy';
                            newRow.getCell(7).numFmt = 'mm/dd/yyyy';
                        });
                    });

                    const buffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${activeProject.name}_${activeVersion.name}_Gantt.xlsx`.replace(/\s+/g, '_');
                    a.click();
                    URL.revokeObjectURL(url);
                } catch (err) {
                    console.error(err);
                    alert("Failed to export Excel! " + err.message);
                }
                setIsExporting(false);
                setShowExportModal(false);
            };

            const exportPDF = async () => {
                setIsExporting(true);
                try {
                    if (!window.jspdf) {
                        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
                    }
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF('landscape', 'pt', pdfPaperSize);
                    const hexToRgb = (hex) => {
                        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                        return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : { r: 100, g: 100, b: 100 };
                    };
                    const blendWhite = (rgb, a) => ({ r: Math.round(rgb.r * a + 255 * (1 - a)), g: Math.round(rgb.g * a + 255 * (1 - a)), b: Math.round(rgb.b * a + 255 * (1 - a)) });

                    const safeRoundedRect = (d, x, y, w, h, rx, ry, style) => {
                        if (!isFinite(x) || !isFinite(y) || !isFinite(w) || !isFinite(h) || w <= 0 || h <= 0) return;
                        const safeRx = Math.min(rx, w / 2);
                        const safeRy = Math.min(ry, h / 2);
                        d.roundedRect(x, y, w, h, safeRx, safeRy, style);
                    };
                    const margin = 40;
                    const pageWidth = doc.internal.pageSize.getWidth();
                    const pageHeight = doc.internal.pageSize.getHeight();
                    const accentColor = (() => {
                        const firstPhaseColor = phases.length > 0 ? (phaseColors[phases[0]] || '#6366f1') : '#6366f1';
                        return hexToRgb(firstPhaseColor);
                    })();
                    const drawHeader = (pageNum, totalPages, titlePostfix) => {
                        let cursorY = margin - 8;
                        let textLeftX = margin;
                        // Logo
                        if (companyLogo) {
                            try {
                                doc.addImage(companyLogo, 'PNG', margin, cursorY - 2, 0, 32);
                                const imgProps = doc.getImageProperties(companyLogo);
                                const logoW = (imgProps.width / imgProps.height) * 32;
                                textLeftX = margin + logoW + 12;
                            } catch (e) { textLeftX = margin; }
                        }
                        // Company name
                        if (companyName) {
                            doc.setFont("helvetica", "bold"); doc.setFontSize(10); doc.setTextColor(100, 116, 139);
                            doc.text(companyName.toUpperCase(), textLeftX, cursorY + 8);
                            cursorY += 14;
                        }
                        // Schedule title
                        doc.setFont("helvetica", "bold"); doc.setFontSize(16); doc.setTextColor(15, 23, 42);
                        doc.text(`${activeVersion.name}${titlePostfix || ''}`, textLeftX, cursorY + 10);
                        cursorY += 16;
                        // Project / Client / Date line
                        doc.setFontSize(9); doc.setFont("helvetica", "normal"); doc.setTextColor(120, 133, 150);
                        const infoParts = [`Project: ${activeProject.name}`];
                        if (activeProject.clientName) infoParts.push(`Client: ${activeProject.clientName}`);
                        infoParts.push(`Date: ${new Date().toLocaleDateString()}`);
                        doc.text(infoParts.join('   •   '), textLeftX, cursorY + 10);
                        cursorY += 18;
                        // Divider line
                        doc.setDrawColor(226, 232, 240); doc.setLineWidth(0.75);
                        doc.line(margin, cursorY, pageWidth - margin, cursorY);
                    };
                    const headerHeight = (companyName ? 58 : 44);
                    const drawFooter = (pageNum, totalPages) => {
                        const footerY = pageHeight - 28;
                        // Footer divider line
                        doc.setDrawColor(226, 232, 240); doc.setLineWidth(0.5);
                        doc.line(margin, footerY - 6, pageWidth - margin, footerY - 6);
                        // Footer text
                        if (companyFooter) {
                            doc.setFont("helvetica", "normal"); doc.setFontSize(7); doc.setTextColor(148, 163, 184);
                            doc.text(companyFooter, margin, footerY + 2);
                        }
                        // Confidential label
                        if (showConfidential) {
                            doc.setFont("helvetica", "bold"); doc.setFontSize(7); doc.setTextColor(180, 190, 205);
                            doc.text('CONFIDENTIAL', margin, footerY + 2);
                        }
                        // Page number — bottom right
                        doc.setFont("helvetica", "normal"); doc.setFontSize(7); doc.setTextColor(148, 163, 184);
                        doc.text(`Page ${pageNum} of ${totalPages || 1}`, pageWidth - margin, footerY + 2, { align: 'right' });
                    };

                    if (layoutView === 'Timeline') {
                        drawHeader(1, 1);
                        drawFooter(1, 1);
                        const topOffset = margin + headerHeight + 10;
                        const footerReserve = 60;
                        const timelineW = pageWidth - margin * 2;
                        const maxContentY = pageHeight - footerReserve;
                        const axisY = topOffset + ((pageHeight - topOffset - footerReserve) / 2) - 20;
                        // Subtle page border
                        doc.setDrawColor(230, 235, 242); doc.setLineWidth(0.5);
                        safeRoundedRect(doc, margin - 4, topOffset - 4, pageWidth - margin * 2 + 8, pageHeight - topOffset - 32, 4, 4, 'S');

                        // Timeline Bar Track
                        doc.setFillColor(234, 238, 244);
                        safeRoundedRect(doc, margin, axisY - 1, timelineW, 2, 1, 1, 'F');

                        // Week Ticks
                        doc.setDrawColor(203, 213, 225); doc.setLineWidth(0.75);
                        timelineHeaders.weeks.forEach(w => {
                            const percent = (w.dayOffset / totalDays);
                            if (percent >= 0 && percent <= 1) {
                                const tickX = margin + percent * timelineW;
                                doc.line(tickX, axisY - 2, tickX, axisY + 2);
                            }
                        });

                        // Month Markers & Labels
                        timelineHeaders.months.forEach(m => {
                            const percent = (m.start / totalDays);
                            if (percent >= 0 && percent <= 1) {
                                const mX = margin + percent * timelineW;
                                doc.setDrawColor(148, 163, 184); doc.setLineWidth(1.5);
                                doc.line(mX, axisY - 4, mX, axisY + 4);

                                const nameParts = m.name.split(' ');
                                const shortName = nameParts[0].substring(0, 3) + (nameParts.length > 1 ? ` '${nameParts[1].substring(2)}` : '');
                                doc.setFontSize(7); doc.setFont("helvetica", "bold"); doc.setTextColor(107, 114, 128);
                                doc.text(shortName, mX, axisY + 12, { align: 'center' });
                            }
                        });

                        const milestones = filteredTasks.filter(t => t.milestone > 0);
                        milestones.forEach((m) => {
                            const offsetDays = diffDays(timelineBounds.start.toISOString().split('T')[0], m.start);
                            const percent = Math.max(0, Math.min(1, offsetDays / totalDays));
                            const x = margin + percent * timelineW;
                            const isOwner = m.milestone === 2;
                            const h = m.labelHeight || (isOwner ? 70 : 40);

                            // Leader line
                            doc.setDrawColor(203, 213, 225); doc.setLineWidth(1);
                            doc.line(x, axisY, x, axisY - h);

                            // Diamond marker (shadow then main)
                            const size = 3.5;
                            // Fake shadow
                            doc.setFillColor(0, 0, 0, 0.05);
                            doc.triangle(x, axisY - size + 0.5, x + size + 0.5, axisY + 0.5, x, axisY + size + 0.5, 'F');
                            doc.triangle(x, axisY - size + 0.5, x - size - 0.5, axisY + 0.5, x, axisY + size + 0.5, 'F');

                            // Main Diamond
                            if (m.color) { const mc = hexToRgb(m.color); doc.setFillColor(mc.r, mc.g, mc.b); }
                            else if (isOwner) doc.setFillColor(16, 185, 129);

                                                    const oXE = timelineX + ((oDrawE + 1) - startDayIdx) * printDayWidth;
                                                    const oW = Math.max(oXE - oXS, 2);
                                                    if (isFinite(oXS) && isFinite(oW) && oW > 0) {
                                                        safeRoundedRect(doc, oXS, y + 4, oW, pdfRowH - 8, 2, 2, 'F');
                                                    }
                                                }
                                            }
                                            segments.forEach(seg => {
                                                const segSI = diffDays(pdfStartStr, seg.start);
                                                const segEI = diffDays(pdfStartStr, seg.end);
                                                if (segEI >= startDayIdx && segSI <= endDayIdx) {
                                                    const dSI = Math.max(startDayIdx, segSI); const dEI = Math.min(endDayIdx, segEI);
                                                    const xS = timelineX + (dSI - startDayIdx) * printDayWidth;
                                                    const xE = timelineX + ((dEI + 1) - startDayIdx) * printDayWidth;
                                                    let w = xE - xS; if (w < 2) w = 2;
                                                    if (isFinite(xS) && isFinite(w) && w > 0) {
                                                        doc.setFillColor(rgb.r, rgb.g, rgb.b);
                                                        safeRoundedRect(doc, xS, y + 4, w, pdfRowH - 8, 2, 2, 'F');
                                                    }
                                                }
                                            });
                                        }

                                        if (alwaysShowTaskNames) {
                                            const drawE = Math.min(endDayIdx, tEndIdx);
                                            const drawS = Math.max(startDayIdx, tStartIdx);
                                            if (drawE >= startDayIdx) {
                                                const isMS = t.milestone > 0;

                                                // If label is in the right 1/3 of the page, push it to the left of the bar
                                                const isRightThird = (drawE - startDayIdx) > ((endDayIdx - startDayIdx) * 0.66);

                                                let labelX;
                                                let align = 'left';

                                                if (isRightThird) {
                                                    labelX = timelineX + (drawS - startDayIdx) * printDayWidth - (isMS ? 6 : 4);
                                                    align = 'right';
                                                } else {
                                                    labelX = timelineX + ((drawE + 1) - startDayIdx) * printDayWidth + (isMS ? 6 : 4);
                                                }

                                                doc.setFont("helvetica", "normal");
                                                doc.setFontSize(6);
                                                doc.setTextColor(100, 116, 139);
                                                let pdfDisplayDur = t.duration;
                                                if (viewMode === 'Weeks') pdfDisplayDur = Math.ceil(t.duration / 5);
                                                else if (viewMode === 'Days') pdfDisplayDur = getDurationBetweenDates(t.start, endDateStr, 'Calendar');
                                                const durStr = isMS ? '' : ` (${pdfDisplayDur}${viewMode === 'Weeks' ? ' wks' : viewMode === 'Days' ? ' cal. days' : ' bus. days'})`;
                                                doc.text(t.name, labelX, y + (pdfRowH / 2) + 2, { align });
                                                if (durStr) {
                                                    const nameWidth = doc.getTextWidth(t.name);
                                                    const durX = align === 'right' ? labelX - nameWidth : labelX + nameWidth;
                                                    doc.setTextColor(148, 163, 184); // Lighter color for duration
                                                    doc.text(durStr, durX, y + (pdfRowH / 2) + 2, { align });
                                                }
                                            }
                                        }
                                    }
                                }
                                // Column dividers
                                doc.setDrawColor(226, 232, 240);
                                pdfVisibleCols.forEach((c, ci) => {
                                    if (ci > 0) doc.line(pdfCols[c.key].x, y, pdfCols[c.key].x, y + pdfRowH);
                                });
                                doc.line(timelineX, y, timelineX, y + pdfRowH);
                            }

                            // Bottom bounding line
                            doc.setDrawColor(203, 213, 225);
                            doc.line(margin, startY + (endRow - startRow) * pdfRowH, pageWidth - margin, startY + (endRow - startRow) * pdfRowH);
                            pageNum++;
                        }
                    }

                    const pdfBlob = doc.output('blob');
                    const url = URL.createObjectURL(pdfBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${activeProject.name.replace(/\s+/g, '_')}_Schedule.pdf`;
                    a.click();
                    setTimeout(() => URL.revokeObjectURL(url), 100);
                } catch (err) {
                    console.error(err);
                    alert("Failed to export PDF! " + err.message);
                }
                setIsExporting(false);
                setShowExportModal(false);
            };


            const exportCSV = () => {
                let csv = 'Phase,Task Name,Party,Duration,Start Date,End Date\n';
                flattenedPhases.forEach(fp => {
                    const p = fp.phase;
                    if (tasksByPhase[p]) {
                        tasksByPhase[p].forEach(t => {
                            const endStr = calculateEndDate(t.start, t.duration, durationType);
                            let exportDur = t.duration;
                            if (viewMode === 'Weeks') exportDur = Math.ceil(t.duration / 5);
                            else if (viewMode === 'Days') exportDur = getDurationBetweenDates(t.start, endStr, 'Calendar');
                            csv += `"${p}","${t.name}","${t.party}","${exportDur}","${t.start}","${endStr}"\n`;
                        });
                    }
                });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${activeProject.name}_${activeVersion.name}.csv`.replace(/\s+/g, '_');
                a.click();
                URL.revokeObjectURL(url);
                setShowExportModal(false);

            const exportMilestoneICS = () => {

                a.download = `${activeProject.name}_Milestones.ics`.replace(/\s+/g, '_');

                URL.revokeObjectURL(url);
                setShowExportModal(false);

            return (
                <div className={`flex flex-col h-screen font-sans transition-colors ${isDarkMode ? 'dark bg-slate-900 text-slate-100' : 'bg-slate-50 text-slate-800'} ${(resizingCol || resizingTimeline || resizingPanel) ? 'select-none' : ''} ${dragTaskState ? 'select-none' : ''}`}>

                    <input type="color" ref={colorInputRef} style={{ position: 'fixed', visibility: 'hidden', width: 0, height: 0, left: contextMenu?.x || 0, top: contextMenu?.y || 0 }} onChange={(e) => { if (colorTargetRef.current) handleTaskChange(colorTargetRef.current, 'color', e.target.value); }} />

                    {/* --- TOP HEADER --- */}
                    <header className="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-6 py-3 flex items-center justify-between shadow-sm z-50 relative transition-colors">
                        <div className="flex items-center space-x-4">
                            <div className="bg-gradient-to-br from-indigo-500 to-indigo-700 p-2 rounded-xl shadow-inner text-white">
                                <Briefcase className="w-5 h-5" />
                            </div>
                            <div className="flex flex-col">
                                <h1 className="text-xl font-bold tracking-tight leading-tight text-slate-900 dark:text-white">ArchiSchedule</h1>

                                <div className="group relative flex items-center text-xs font-semibold text-slate-500 dark:text-slate-400 cursor-pointer hover:text-indigo-600 dark:hover:text-indigo-400 mt-0.5 pb-1">
                                    <Folder className="w-3 h-3 mr-1" /> {activeProject.name} <span className="mx-1">/</span> <FileIcon className="w-3 h-3 mr-1" /> {activeVersion.name}
                                    {activeProject.clientName && <><span className="mx-1">/</span> <Briefcase className="w-3 h-3 mr-1" /> {activeProject.clientName}</>}
                                    <ChevronDown className="w-3 h-3 ml-1" />

                                    <div className="absolute top-full left-0 w-72 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50 py-2">
                                        <div className="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1 px-4">Projects</div>
                                        <div className="px-2 mb-2">
                                            {projects.map(p => (
                                                <div key={p.id} className="flex items-center justify-between px-2 py-1.5 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-md group/proj">
                                                    <button onClick={() => { setActiveProjectId(p.id); setActiveVersionId(p.versions[0].id); }} className={`flex-1 text-left text-sm font-medium truncate ${activeProjectId === p.id ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-700 dark:text-slate-200'}`}>
                                                        {p.name}
                                                    </button>
                                                    <button onClick={(e) => { e.stopPropagation(); setRenameModal({ type: 'project', id: p.id, name: p.name, clientName: p.clientName || '' }); }} className="opacity-0 group-hover/proj:opacity-100 text-slate-400 hover:text-indigo-600 p-1"><Edit2 className="w-3 h-3" /></button>
                                                </div>
                                            ))}

                                        isUndoRedoRef.current = true;
                                        setProjects(snapshot);
                                        Promise.resolve().then(() => { isUndoRedoRef.current = false; });

                                    title="Undo (Ctrl+Z)"

                                >
                                    <Undo2 className="w-4 h-4" />
                                </button>
                                <button
                                    onClick={() => {

                                        undoStackRef.current = [...undoStackRef.current.slice(-99), JSON.parse(JSON.stringify(projectsRef.current))];
                                        isUndoRedoRef.current = true;

                                        Promise.resolve().then(() => { isUndoRedoRef.current = false; });

                                >

                                </button>
                            </div>

                            <div className="h-6 w-px bg-slate-200 dark:bg-slate-700"></div>

                            <div className="flex items-center space-x-2">
                                <button onClick={() => setShowViewModal(true)} className="flex items-center space-x-2 text-sm font-semibold text-slate-600 dark:text-slate-300 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors bg-slate-100 dark:bg-slate-700 px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 shadow-sm" title="View Settings">

                                <button onClick={() => setShowHolidaysModal(true)} className="flex items-center space-x-2 text-sm font-semibold text-slate-600 dark:text-slate-300 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors bg-slate-100 dark:bg-slate-700 px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 shadow-sm" title="Holidays">

                                <button onClick={() => setShowExportModal(true)} className="flex items-center space-x-2 text-sm font-semibold text-slate-600 dark:text-slate-300 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors bg-slate-100 dark:bg-slate-700 px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 shadow-sm" title="Export">

                            <div className="h-6 w-px bg-slate-200 dark:bg-slate-700"></div>

                            <div className="flex items-center space-x-2">
                                {/* Phase Filter Popover */}
                                <div className="relative">
                                    <button
                                        onClick={(e) => { e.stopPropagation(); setActivePopover(activePopover === 'phase' ? null : 'phase'); }}
                                        className={`flex items-center justify-center w-[30px] h-[30px] rounded-md bg-white dark:bg-slate-800 border ${activePopover === 'phase' ? 'border-indigo-500 ring-1 ring-indigo-500' : 'border-slate-200 dark:border-slate-700'} hover:bg-slate-50 dark:hover:bg-slate-700 transition-all shadow-sm`}
                                        title="Filter Phases"
                                    >
                                        <Filter className={`w-4 h-4 ${selectedPhases.length > 0 ? 'text-indigo-500' : 'text-slate-500 dark:text-slate-400'}`} />
                                        {selectedPhases.length > 0 && <div className="absolute -top-1 -right-1 flex items-center justify-center min-w-[14px] h-[14px] bg-indigo-500 text-white text-[8px] font-bold rounded-full border border-white dark:border-slate-800 px-0.5">{selectedPhases.length}</div>}
                                    </button>

                                    {activePopover === 'phase' && (
                                        <div className="absolute top-full right-0 mt-2 w-64 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-2xl z-[150] p-4 overflow-hidden animate-in fade-in slide-in-from-top-2 duration-200" onClick={(e) => e.stopPropagation()}>
                                            <div className="flex items-center justify-between mb-3 border-b border-slate-100 dark:border-slate-700 pb-2">
                                                <span className="text-xs font-bold text-slate-800 dark:text-slate-100 flex items-center"><Filter className="w-3.5 h-3.5 mr-1.5 text-indigo-500" /> Filter Phases</span>
                                                <button onClick={() => setSelectedPhases([])} className="text-[10px] font-bold text-indigo-600 dark:text-indigo-400 hover:underline">Clear All</button>
                                            </div>
                                            <div className="space-y-1 max-h-64 overflow-y-auto pr-1 custom-scrollbar">
                                                {phases.map(p => (
                                                    <label key={p} className="flex items-center justify-between px-2 py-1.5 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg cursor-pointer transition-colors group">
                                                        <span className="text-xs font-semibold text-slate-600 dark:text-slate-300 group-hover:text-slate-900 dark:group-hover:text-white transition-colors">{p}</span>
                                                        <input

                                                                else setSelectedPhases(selectedPhases.filter(item => item !== p));
