                                                            className="custom-checkbox w-4 h-4"
                                                        />
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* Party Filter Popover */}
                                <div className="relative">
                                    <button
                                        onClick={(e) => { e.stopPropagation(); setActivePopover(activePopover === 'party' ? null : 'party'); }}
                                        className={`flex items-center justify-center w-[30px] h-[30px] rounded-md bg-white dark:bg-slate-800 border ${activePopover === 'party' ? 'border-indigo-500 ring-1 ring-indigo-500' : 'border-slate-200 dark:border-slate-700'} hover:bg-slate-50 dark:hover:bg-slate-700 transition-all shadow-sm`}
                                        title="Filter Parties"
                                    >
                                        <Users className={`w-4 h-4 ${selectedParties.length > 0 ? 'text-indigo-500' : 'text-slate-500 dark:text-slate-400'}`} />
                                        {selectedParties.length > 0 && <div className="absolute -top-1 -right-1 flex items-center justify-center min-w-[14px] h-[14px] bg-indigo-500 text-white text-[8px] font-bold rounded-full border border-white dark:border-slate-800 px-0.5">{selectedParties.length}</div>}
                                    </button>

                                    {activePopover === 'party' && (
                                        <div className="absolute top-full right-0 mt-2 w-64 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-2xl z-[150] p-4 overflow-hidden animate-in fade-in slide-in-from-top-2 duration-200" onClick={(e) => e.stopPropagation()}>
                                            <div className="flex items-center justify-between mb-3 border-b border-slate-100 dark:border-slate-700 pb-2">
                                                <span className="text-xs font-bold text-slate-800 dark:text-slate-100 flex items-center"><Users className="w-3.5 h-3.5 mr-1.5 text-indigo-500" /> Filter Parties</span>
                                                <button onClick={() => setSelectedParties([])} className="text-[10px] font-bold text-indigo-600 dark:text-indigo-400 hover:underline">Clear All</button>

                                            <div className="space-y-1.5 max-h-48 overflow-y-auto pr-1 custom-scrollbar">
                                                {(activeProject.parties || DEFAULT_PARTIES).map(p => (
                                                    <label key={p} className="flex items-center justify-between px-2 py-1.5 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg cursor-pointer transition-colors group">

                                                        <input
                                                            type="checkbox"
                                                            checked={selectedParties.includes(p)}
                                                            onChange={(e) => {
                                                                if (e.target.checked) setSelectedParties([...selectedParties, p]);
                                                                else setSelectedParties(selectedParties.filter(item => item !== p));
                                                            }}
                                                            className="custom-checkbox w-4 h-4"
                                                        />
                                                    </label>

                                                    onClick={(e) => { e.stopPropagation(); setShowPartyModal(true); setActivePopover(null); }}

                                                    <div className="flex flex-col">
                                                        <span className="text-[11px] font-bold text-slate-700 dark:text-slate-200">Highlight Mode</span>
                                                        <span className="text-[9px] text-slate-400 dark:text-slate-500">Fade non-selected tasks</span>
                                                    </div>
                                                    <div className={`w-8 h-4.5 rounded-full transition-colors relative ${partyHighlightMode ? 'bg-indigo-500' : 'bg-slate-200 dark:bg-slate-700'}`}>
                                                        <div className={`absolute top-0.5 w-3.5 h-3.5 bg-white rounded-full shadow-sm transition-transform ${partyHighlightMode ? 'left-4' : 'left-0.5'}`}></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                            <button onClick={() => setAlwaysShowTaskNames(!alwaysShowTaskNames)} className={`flex items-center px-3 py-1.5 rounded-md text-xs font-bold transition-all border shadow-sm ${alwaysShowTaskNames ? 'bg-indigo-50 dark:bg-indigo-900/30 border-indigo-200 dark:border-indigo-800 text-indigo-700 dark:text-indigo-300' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300'}`} title="Toggle Gantt task names visibility">
                                Names
                            </button>
                        </div>

                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 transition-colors">
                            {isDarkMode ? <Sun className="w-5 h-5" /> : <Moon className="w-5 h-5" />}
                        </button>
                    </header>
                    {/* --- SCHEDULE HEALTH DASHBOARD --- */}
                    {healthMetrics && showDashboard && (
                        <div className="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-6 py-2 flex items-center space-x-8 overflow-x-auto no-scrollbar transition-colors shadow-sm">
                            <div className="flex items-center space-x-2">
                                <div className="p-1.5 bg-indigo-50 dark:bg-indigo-900/30 rounded-lg">
                                    <Clock className="w-4 h-4 text-indigo-600 dark:text-indigo-400" />
                                </div>
                                <div>
                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Project Duration</div>
                                    <div className="text-sm font-bold text-slate-700 dark:text-slate-200">{healthMetrics.totalDur} {durationType === 'Weeks' ? 'w' : 'd'}</div>
                                </div>
                            </div>

                            <div className="h-8 w-px bg-slate-100 dark:bg-slate-700"></div>

                            <div className="flex items-center space-x-2">
                                <div className="p-1.5 bg-emerald-50 dark:bg-emerald-900/30 rounded-lg">
                                    <CheckCircle2 className="w-4 h-4 text-emerald-600 dark:text-emerald-400" />
                                </div>
                                <div>
                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Tasks & Milestones</div>
                                    <div className="text-sm font-bold text-slate-700 dark:text-slate-200">{healthMetrics.taskCount} <span className="text-slate-400 font-medium">T</span> · {healthMetrics.milestoneCount} <span className="text-slate-400 font-medium">M</span></div>
                                </div>
                            </div>

                            <div className="h-8 w-px bg-slate-100 dark:bg-slate-700"></div>

                            <div className="flex items-center space-x-2">
                                <div className="p-1.5 bg-rose-50 dark:bg-rose-900/30 rounded-lg">
                                    <AlertTriangle className="w-4 h-4 text-rose-600 dark:text-rose-400" />
                                </div>
                                <div>
                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Criticality Index</div>
                                    <div className="text-sm font-bold text-slate-700 dark:text-slate-200">{healthMetrics.criticalityIndex}% <span className="text-slate-400 font-medium">Path</span></div>
                                </div>
                            </div>

                            <div className="h-8 w-px bg-slate-100 dark:bg-slate-700"></div>

                            <div className="flex items-center space-x-2">
                                <div className="p-1.5 bg-amber-50 dark:bg-amber-900/30 rounded-lg">
                                    <Flag className="w-4 h-4 text-amber-600 dark:text-amber-400" />
                                </div>
                                <div>
                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Upcoming (14d)</div>
                                    <div className="text-sm font-bold text-slate-700 dark:text-slate-200">{healthMetrics.upcomingMilestones} <span className="text-slate-400 font-medium">Milestones</span></div>
                                </div>
                            </div>

                            <div className="flex-1"></div>

                            <div className="flex items-center space-x-2 text-[10px] font-bold text-slate-400">
                                <Calendar className="w-3.5 h-3.5" />
                                <span>{formatShortDate(healthMetrics.minDate)} – {formatShortDate(healthMetrics.maxDate)}</span>
                            </div>
                        </div>
                    )}

                    {/* --- MAIN WORKSPACE --- */}
                    <div id="main-workspace" className="flex flex-1 overflow-hidden bg-slate-50 dark:bg-slate-900 transition-colors relative" ref={exportTargetRef}>

                        {layoutView === 'Gantt' && (
                            <>
                                {/* LEFT PANEL */}
                                <div id="pdf-left-panel" style={{ width: panelWidth }} className="flex-shrink-0 border-r border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-20 relative transition-colors flex flex-col overflow-hidden">
                                    <div className="absolute top-0 right-0 bottom-0 w-1.5 bg-transparent hover:bg-slate-300/50 dark:hover:bg-indigo-600/30 cursor-col-resize z-50" onMouseDown={(e) => { e.preventDefault(); setResizingPanel(true); }} />

                                    <div
                                        className="w-full flex-1 overflow-x-auto overflow-y-auto relative scrollbar-hide"
                                        onScroll={(e) => {
                                            if (timelineContainerRef.current && timelineContainerRef.current.scrollTop !== e.target.scrollTop) {
                                                timelineContainerRef.current.scrollTop = e.target.scrollTop;
                                            }
                                        }}
                                    >
                                        <div id="pdf-left-inner" style={{ minWidth: tableInnerWidth }} className="w-full relative">

                                            {linkingState && linkingState.panel === 'left' && (
                                                <svg className="absolute top-[64px] left-0 w-full h-[calc(100%-64px)] pointer-events-none z-50">
                                                    <path d={`M ${linkingState.startX},${linkingState.startY} C ${linkingState.startX + 50},${linkingState.startY} ${linkingState.currentX - 50},${linkingState.currentY} ${linkingState.currentX},${linkingState.currentY}`} stroke="#6366f1" strokeWidth="2" fill="none" strokeDasharray="4 4" />
                                                    <circle cx={linkingState.currentX} cy={linkingState.currentY} r="4" fill="#6366f1" />
                                                </svg>
                                            )}

                                            <svg className={`absolute top-[64px] left-0 w-full h-[calc(100%-64px)] z-40 overflow-visible link-svg-fade ${activeTaskId ? 'visible' : 'hidden'}`} style={{ pointerEvents: activeTaskId ? 'none' : 'none' }}>
                                                {tasks.map(task => {
                                                    const isTaskHovered = activeTaskId === task.id;
                                                    const hasHoveredDep = task.deps.includes(activeTaskId);
                                                    if (!isTaskHovered && !hasHoveredDep) return null;

                                                    return task.deps.map(depId => {
                                                        if (activeTaskId !== task.id && activeTaskId !== depId) return null;
                                                        const depCoords = taskCoordinates[depId];
                                                        const taskCoords = taskCoordinates[task.id];
                                                        if (!depCoords || !taskCoords) return null;

                                                        const x1 = colWidths.name - 16;
                                                        const y1 = depCoords.y;
                                                        const x2 = colWidths.name - 16; const y2 = taskCoords.y;
                                                        const path = `M ${x1},${y1} C ${x1 + 15},${y1} ${x2 + 15},${y2} ${x2},${y2}`;
                                                        const isBackward = y1 > y2;
                                                        const strokeColor = isBackward ? '#a78bfa' : (isDarkMode ? '#6366f1' : '#4f46e5');

                                                        return (
                                                            <g key={`lp-${depId}-${task.id}`} className="link-hit-group" onMouseLeave={(e) => { if (e.relatedTarget && e.relatedTarget.closest && e.relatedTarget.closest('.left-task-hitbox, .link-hit-group')) return; setPanelHoveredTask(null); }}>
                                                                <path d={path} stroke="transparent" strokeWidth="14" fill="none" style={{ pointerEvents: 'auto', cursor: 'pointer' }} onClick={(e) => { e.stopPropagation(); linkTasks(depId, task.id); }} />
                                                                <path d={path} stroke={strokeColor} strokeWidth="2" fill="none" style={{ pointerEvents: 'none' }} className="link-visible-path transition-colors" />
                                                            </g>
                                                        );
                                                    });
                                                })}
                                            </svg>

                                            {/* Grid Header */}
                                            <div className="flex items-center h-[64px] bg-slate-50 dark:bg-slate-800/80 backdrop-blur-sm border-b border-slate-200 dark:border-slate-700 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider sticky top-0 z-30 shadow-sm">
                                                <div className="w-8 flex-shrink-0 flex items-center justify-center">
                                                    <input
                                                        type="checkbox"
                                                        checked={selectedTaskIds.size > 0 && tasks.every(t => selectedTaskIds.has(t.id))}
                                                        onChange={(e) => {
                                                            if (e.target.checked) setSelectedTaskIds(new Set(tasks.map(t => t.id)));
                                                            else setSelectedTaskIds(new Set());
                                                        }}
                                                        className="custom-checkbox w-4 h-4"
                                                    />
                                                </div>
                                                {visibleCols.map(col => (
                                                    <div
                                                        key={col}
                                                        style={{ width: colWidths[col] }}
                                                        className={`${col === 'name' ? 'px-1' : 'px-2'} relative flex items-center flex-shrink-0 cursor-grab ${draggedColHeader === col ? 'opacity-40' : ''} ${dropColTarget === col ? 'border-l-2 border-indigo-500' : ''} transition-all`}
                                                        draggable
                                                        onDragStart={(e) => {
                                                            setDraggedColHeader(col);
                                                            e.dataTransfer.setData('type', 'column');
                                                            e.dataTransfer.effectAllowed = 'move';
                                                        }}
                                                        onDragOver={(e) => {
                                                            if (draggedColHeader && draggedColHeader !== col) {
                                                                e.preventDefault();
                                                                setDropColTarget(col);
                                                            }
                                                        }}
                                                        onDragLeave={() => setDropColTarget(null)}
                                                        onDrop={() => handleColumnDrop(col)}
                                                        onDragEnd={() => {
                                                            setDraggedColHeader(null);
                                                            setDropColTarget(null);
                                                        }}
                                                    >
                                                        {col === 'name' ? 'Task Name' : col === 'phasePercentage' ? 'Phase %' : col === 'party' ? 'Party' : col === 'duration' ? `Dur (${viewMode === 'Days' ? 'Cal' : viewMode === 'Weeks' ? 'Wks' : 'Bus'})` : col === 'start' ? 'Start Date' : 'End Date'}
                                                        <div className="absolute right-0 top-0 bottom-0 w-2 cursor-col-resize hover:bg-indigo-300 dark:hover:bg-indigo-600 z-10 -mr-1 transition-colors" onMouseDown={(e) => { e.preventDefault(); setResizingCol({ col, startX: e.clientX, startWidth: colWidths[col] }); }} />
                                                    </div>
                                                ))}
                                            </div>

                                            {/* Body */}
                                            {renderPhases.map(rp => {
                                                const phase = rp.phase;
                                                const level = rp.level;
                                                const hasChildren = rp.hasChildren;
                                                const hasItems = hasChildren || (tasksByPhase[phase] && tasksByPhase[phase].length > 0);
                                                const isExpanded = expandedPhases[phase] !== false;
                                                const pBounds = phaseBounds[phase];
                                                let phaseDisplayDur = 0;
                                                if (pBounds) {
                                                    if (viewMode === 'Weeks') {
                                                        const dur = getDurationBetweenDates(pBounds.minS, pBounds.maxE, 'Business');
                                                        phaseDisplayDur = Math.ceil(dur / 5);
                                                    } else if (viewMode === 'Days') {
                                                        phaseDisplayDur = getDurationBetweenDates(pBounds.minS, pBounds.maxE, 'Calendar');
                                                    } else {
                                                        phaseDisplayDur = getDurationBetweenDates(pBounds.minS, pBounds.maxE, 'Business');
                                                    }
                                                }

                                                const isPhaseDragTarget = dragOverTarget?.id === phase && dragOverTarget?.targetType === 'phase';
                                                const isInside = isPhaseDragTarget && dragOverTarget.position === 'inside';
                                                const isBefore = isPhaseDragTarget && dragOverTarget.position === 'before';
                                                const isAfter = isPhaseDragTarget && dragOverTarget.position === 'after';

                                                return (
                                                    <div key={phase} className="mb-0">
                                                        <div
                                                            draggable
                                                            onDragStart={(e) => { e.dataTransfer.setData('type', 'phase'); setDraggedItem({ type: 'phase', id: phase }); }}
                                                            onDragOver={(e) => {
                                                                e.preventDefault();
                                                                const rect = e.currentTarget.getBoundingClientRect();
                                                                const relativeY = e.clientY - rect.top;
                                                                let position = 'inside';
                                                                if (relativeY < rect.height * 0.33) position = 'before';
                                                                else if (relativeY > rect.height * 0.67) position = 'after';
                                                                setDragOverTarget({ id: phase, targetType: 'phase', position });
                                                            }}
                                                            onDragLeave={() => setDragOverTarget(null)}
                                                            onDrop={(e) => handleItemDrop(e, phase, 'phase', phase)}
                                                            className={`flex items-center border-b border-slate-100 dark:border-slate-700/50 group transition-colors cursor-grab ${isBefore ? 'border-t-2 border-t-indigo-500' : ''} ${isAfter ? 'border-b-2 border-b-indigo-500' : ''} ${isInside ? 'bg-indigo-50/10 dark:bg-indigo-900/10' : ''}`}
                                                            style={{ backgroundColor: `${phaseColors[phase] || '#94a3b8'}30`, height: `${rowHeight}px`, fontSize: `${textSize}px` }}
                                                            onClick={() => setExpandedPhases(p => ({ ...p, [phase]: !p[phase] }))}
                                                        >
                                                            <div className="w-8 flex-shrink-0"></div>
                                                            {visibleCols.map(col => {
                                                                if (col === 'name') {
                                                                    return (
                                                                        <React.Fragment key="name">
                                                                            <div className="flex-shrink-0 self-stretch" style={{ width: '3px', marginLeft: `${level * 24}px` }}></div>
                                                                            <div className="w-5 flex justify-center text-slate-400 flex-shrink-0 relative">
                                                                                {hasItems ? (isExpanded ? <ChevronDown className="w-3.5 h-3.5" /> : <ChevronRight className="w-3.5 h-3.5" />) : <div className="w-3.5 h-3.5" />}
                                                                            </div>

                                                                            <div style={{ width: colWidths.name - (level * 24) - 23 }} className="px-1 flex items-center flex-shrink-0">
                                                                                <input type="color" value={phaseColors[phase] || '#94a3b8'} onChange={(e) => { e.stopPropagation(); const val = e.target.value; updateVersion(null, null, prev => ({ ...prev, [phase]: val })); }} onClick={(e) => e.stopPropagation()} className="w-3.5 h-3.5 p-0 border-0 rounded-full cursor-pointer mr-1.5 bg-transparent shadow-sm flex-shrink-0" />
                                                                                {editingPhase && editingPhase.oldName === phase ? (
                                                                                    <input
                                                                                        autoFocus
                                                                                        type="text"
                                                                                        value={editingPhase.tempName}
                                                                                        onClick={e => e.stopPropagation()}
                                                                                        onChange={e => setEditingPhase({ ...editingPhase, tempName: e.target.value })}
                                                                                        onKeyDown={e => {
                                                                                            if (e.key === 'Enter') {
                                                                                                e.preventDefault();
                                                                                                e.stopPropagation();
                                                                                                handleRenamePhaseSubmit();
                                                                                            } else if (e.key === 'Escape') {
                                                                                                setEditingPhase(null);
                                                                                            }
                                                                                        }}
                                                                                        onBlur={handleRenamePhaseSubmit}
                                                                                        className="font-bold text-sm text-slate-900 dark:text-slate-100 bg-white dark:bg-slate-900 border border-indigo-500 rounded px-1 -ml-1 outline-none w-full max-w-[150px]"
                                                                                    />
                                                                                ) : (
                                                                                    <span
                                                                                        className="font-bold text-sm text-slate-800 dark:text-slate-200 truncate pr-1 cursor-text hover:text-indigo-600 dark:hover:text-indigo-400"
                                                                                        onClick={(e) => {
                                                                                            e.stopPropagation();
                                                                                            setEditingPhase({ oldName: phase, tempName: phase });
                                                                                        }}
                                                                                    >
                                                                                        {phase}
                                                                                    </span>
                                                                                )}
                                                                                <button onClick={(e) => { e.stopPropagation(); handleDeletePhase(phase); }} className="opacity-0 group-hover:opacity-100 p-0.5 hover:bg-red-100 hover:text-red-600 dark:hover:bg-red-900/30 dark:hover:text-red-400 rounded transition-all ml-auto"><Trash2 className="w-3 h-3" /></button>
                                                                                <button onClick={(e) => { e.stopPropagation(); addTask(phase); setExpandedPhases(p => ({ ...p, [phase]: true })); }} className="opacity-0 group-hover:opacity-100 p-0.5 bg-indigo-50 dark:bg-indigo-900/50 hover:bg-indigo-100 dark:hover:bg-indigo-800 text-indigo-600 dark:text-indigo-400 rounded transition-all ml-0.5"><Plus className="w-3 h-3" /></button>
                                                                            </div>
                                                                        </React.Fragment>
                                                                    );
                                                                }
                                                                if (col === 'phasePercentage') {
                                                                    return (
                                                                        <div key="phasePercentage" style={{ width: colWidths.phasePercentage }} className="px-1 flex items-center justify-center flex-shrink-0 text-xs font-bold text-slate-600 dark:text-slate-300">
                                                                            <div className="bg-indigo-50 dark:bg-indigo-900/40 px-2 py-0.5 rounded shadow-sm">
                                                                                {rp.percentage}
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                }
                                                                if (col === 'party') return <div key="party" style={{ width: colWidths.party }} className="px-1 flex-shrink-0"></div>;
                                                                if (col === 'duration') {
                                                                    return (
                                                                        <div key="duration" style={{ width: colWidths.duration }} className="px-1 flex-shrink-0">
                                                                            <div className="relative w-full flex items-center justify-center text-xs font-semibold text-slate-500 dark:text-slate-400 py-0.5 rounded" style={{ backgroundColor: `${phaseColors[phase] || '#94a3b8'}20` }}>
                                                                                <span className="pr-3 text-center">{phaseDisplayDur}</span>
                                                                                <span className="absolute right-2 text-[10px] font-medium text-slate-400">{viewMode === 'Weeks' ? 'w' : 'd'}</span>
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                }
                                                                if (col === 'start') return <div key="start" style={{ width: colWidths.start }} className="px-1 pr-2 flex-shrink-0 text-xs font-semibold text-slate-400">{pBounds ? formatShortDate(pBounds.minS) : ''}</div>;
                                                                if (col === 'end') return <div key="end" style={{ width: colWidths.end }} className="px-1 pr-2 flex-shrink-0 text-xs font-semibold text-slate-400">{pBounds ? formatShortDate(pBounds.maxE) : ''}</div>;
                                                                return null;
                                                            })}
                                                        </div>


                                                        {isExpanded && tasksByPhase[phase] && tasksByPhase[phase].map(task => {
                                                            const taskWarning = isNonWorkingDay(task.start, durationType);
                                                            const endDateStr = calculateEndDate(task.start, task.duration, durationType);
                                                            let displayDur = task.duration;
                                                            if (viewMode === 'Weeks') {
                                                                displayDur = Math.ceil(task.duration / 5);
                                                            } else if (viewMode === 'Days') {
                                                                displayDur = getDurationBetweenDates(task.start, endDateStr, 'Calendar');
                                                            }

                                                            const mType = task.milestone || 0;
                                                            const flagColor = mType === 2 ? 'text-emerald-500 bg-emerald-50 dark:bg-emerald-900/20' : mType === 1 ? 'text-amber-500 bg-amber-50 dark:bg-amber-900/20' : 'text-slate-300 dark:text-slate-600 hover:text-slate-500 opacity-0 group-hover:opacity-100';
                                                            const nameColor = mType === 2 ? 'font-extrabold text-emerald-700 dark:text-emerald-400' : mType === 1 ? 'font-bold text-slate-900 dark:text-slate-100' : 'font-medium text-slate-700 dark:text-slate-300';
                                                            const isTaskBefore = dragOverTarget?.id === task.id && dragOverTarget?.targetType === 'task' && dragOverTarget.position === 'before';
                                                            const isTaskAfter = dragOverTarget?.id === task.id && dragOverTarget?.targetType === 'task' && dragOverTarget.position === 'after';


                                                            return (
                                                                !partyHighlightMode && isTaskExcluded(task) ? null :
                                                                    <div
                                                                        key={task.id}
                                                                        draggable
                                                                        onDragStart={(e) => {
                                                                            if (selectedTaskIds.has(task.id)) {
                                                                                const dragData = { type: 'bulk-tasks', ids: Array.from(selectedTaskIds) };
                                                                                e.dataTransfer.setData('text/plain', JSON.stringify(dragData));
                                                                            } else {
                                                                                e.dataTransfer.setData('text/plain', JSON.stringify({ type: 'task', id: task.id }));
                                                                            }
                                                                            setDraggedItem({ type: 'task', id: task.id });
                                                                        }}
                                                                        onDragOver={(e) => {
                                                                            e.preventDefault();
                                                                            const rect = e.currentTarget.getBoundingClientRect();
                                                                            const relativeY = e.clientY - rect.top;
                                                                            const position = relativeY < rect.height * 0.5 ? 'before' : 'after';
                                                                            setDragOverTarget({ id: task.id, targetType: 'task', position, phase });
                                                                        }}
                                                                        onDragLeave={() => setDragOverTarget(null)}
                                                                        onDrop={(e) => {
                                                                            if (draggedItem?.type === 'phase') {
                                                                                handleItemDrop(e, task.id, 'task', phase);
                                                                            } else {
                                                                                handleItemDrop(e, task.id, 'task', phase);
                                                                            }
                                                                        }}
                                                                        onMouseEnter={() => setPanelHoveredTask(task.id)}
                                                                        onMouseLeave={(e) => { if (e.relatedTarget && e.relatedTarget.closest && e.relatedTarget.closest('.link-hit-group')) return; setPanelHoveredTask(null); }}
                                                                        onFocus={(e) => { setFocusedTask(task.id); scrollToTask(task.id); }}
                                                                        onBlur={(e) => { if (!e.currentTarget.contains(e.relatedTarget)) setFocusedTask(null); }}
                                                                        onClick={() => { setFocusedTask(task.id); scrollToTask(task.id); }}
                                                                        onContextMenu={(e) => handleContextMenu(e, task.id)}
                                                                        onKeyDown={(e) => {
                                                                            if (e.key === 'Delete') { e.preventDefault(); deleteTask(task.id); }
                                                                            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'g') { e.preventDefault(); scrollToTask(task.id); }
                                                                        }}

                                                                        className={`flex items-center border-b border-slate-100 dark:border-slate-800 transition-colors group/row left-task-hitbox ${selectedTaskIds.has(task.id) ? 'bg-indigo-50/50 dark:bg-indigo-900/20' : 'hover:bg-slate-50 dark:hover:bg-slate-900/50'} ${isTaskBefore ? 'border-t-2 border-t-indigo-500' : ''} ${isTaskAfter ? 'border-b-2 border-b-indigo-500' : ''} ${activeTaskId === task.id ? 'bg-indigo-50 dark:bg-indigo-900/40' : ''} ${partyHighlightMode && isTaskExcluded(task) ? 'opacity-30 grayscale' : ''}`}

                        {/* --- TIMELINE VIEW --- */}
                        {
