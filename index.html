                                        <div className="space-y-2">
                                            {(activeProject.parties || DEFAULT_PARTIES).map((party) => (
                                                <div key={party} className="flex items-center justify-between bg-slate-50 dark:bg-slate-900/40 border border-slate-100 dark:border-slate-700 px-3 py-2 rounded-xl group transition-all hover:bg-white dark:hover:bg-slate-800 hover:shadow-sm">
                                                    {editingPartyName && editingPartyName.oldName === party ? (
                                                        <input
                                                            autoFocus
                                                            type="text"
                                                            value={editingPartyName.tempName}
                                                            onChange={(e) => setEditingPartyName({ ...editingPartyName, tempName: e.target.value })}
                                                            onKeyDown={(e) => {
                                                                if (e.key === 'Enter') { handleRenameParty(party, editingPartyName.tempName); setEditingPartyName(null); }
                                                                else if (e.key === 'Escape') setEditingPartyName(null);
                                                            }}
                                                            onBlur={() => { if (editingPartyName) { handleRenameParty(party, editingPartyName.tempName); setEditingPartyName(null); } }}
                                                            className="flex-1 bg-white dark:bg-slate-900 border border-indigo-500 rounded px-2 py-1 text-sm font-bold text-slate-800 dark:text-white outline-none -ml-1"
                                                        />
                                                    ) : (
                                                        <span className="text-sm font-bold text-slate-700 dark:text-slate-300 flex-1 cursor-text" onClick={() => setEditingPartyName({ oldName: party, tempName: party })}>{party}</span>
                                                    )}
                                                    <div className="flex items-center space-x-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <button onClick={() => setEditingPartyName({ oldName: party, tempName: party })} className="p-1.5 text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 rounded-lg transition-colors" title="Rename"><Icon name="Edit2" className="w-3.5 h-3.5" fallback={<span className="text-[10px]">✎</span>} /></button>
                                                        <button onClick={() => handleDeleteParty(party)} className="p-1.5 text-slate-400 hover:text-rose-600 dark:hover:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-900/30 rounded-lg transition-colors" title="Delete"><Trash2 className="w-3.5 h-3.5" /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div className="px-6 py-4 border-t border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-end">
                                    <button onClick={() => setShowPartyModal(false)} className="px-5 py-2 text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-sm transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                                        Done
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- SHIFT MODAL --- */}
                    {
                        showShiftModal && (
                            <div className="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
                                <form onSubmit={handleShiftSubmit} className="bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all">
                                    <div className="px-5 py-4 border-b border-slate-100 dark:border-slate-700 flex items-center justify-between">
                                        <h2 className="text-base font-bold text-slate-800 dark:text-white flex items-center"><CalendarDays className="w-5 h-5 mr-2 text-indigo-500" /> Shift Schedule</h2>
                                        <button type="button" onClick={() => setShowShiftModal(false)} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 p-1 rounded-full"><X className="w-4 h-4" /></button>
                                    </div>
                                    <div className="p-5 space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Target Scope</label>
                                            <select
                                                value={shiftTarget}
                                                onChange={(e) => setShiftTarget(e.target.value)}
                                                className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm font-medium focus:ring-2 focus:ring-indigo-500 text-slate-900 dark:text-slate-100"
                                            >
                                                <option value="All">Entire Schedule</option>
                                                {selectedTaskIds.size > 0 && <option value="Selected">Selected Tasks ({selectedTaskIds.size})</option>}
                                                {phases.map(p => (
                                                    <option key={p} value={p}>Phase: {p}</option>
                                                ))}
                                            </select>
                                        </div>

                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Shift Method</label>
                                            <div className="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-lg border border-slate-200 dark:border-slate-700 shadow-inner">
                                                <button type="button" onClick={() => setShiftMode('days')} className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-colors ${shiftMode === 'days' ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-indigo-400 shadow-sm' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300'}`}>By Days</button>
                                                <button type="button" onClick={() => {
                                                    setShiftMode('date');
                                                    // Pre-fill shift date with earliest date of target
                                                    let earliestStr = null;
                                                    tasks.forEach(t => {
                                                        if (shiftTarget === 'All' || t.phase === shiftTarget) {
                                                            if (!earliestStr || t.start < earliestStr) earliestStr = t.start;
                                                        }
                                                    });
                                                    if (earliestStr) setShiftDate(earliestStr);
                                                }} className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-colors ${shiftMode === 'date' ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-indigo-400 shadow-sm' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300'}`}>To Specific Date</button>
                                            </div>
                                        </div>

                                        {shiftMode === 'days' ? (
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Days to Shift</label>
                                                <input autoFocus type="number" value={shiftDays} onChange={(e) => setShiftDays(e.target.value)} placeholder="e.g. 14 or -7" className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm font-medium focus:ring-2 focus:ring-indigo-500 text-slate-900 dark:text-slate-100 transition-colors" />
                                                <p className="mt-2 text-[10px] text-slate-500 dark:text-slate-400 leading-tight">Positive numbers push the schedule out. Negative numbers pull it forward. Dependencies will be automatically adjusted.</p>
                                            </div>
                                        ) : (
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">New Start Date</label>
                                                <input autoFocus type="date" value={shiftDate} onChange={(e) => setShiftDate(e.target.value)} className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm font-medium focus:ring-2 focus:ring-indigo-500 text-slate-900 dark:text-slate-100 transition-colors" />
                                                <p className="mt-2 text-[10px] text-slate-500 dark:text-slate-400 leading-tight">Adjusts the earliest item in the {shiftTarget === 'All' ? 'project' : 'phase'} to this date and shifts everything else relative to it.</p>
                                            </div>
                                        )}
                                    </div>
                                    <div className="px-5 py-3 border-t border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 flex justify-end space-x-2 transition-colors">
                                        <button type="button" onClick={() => setShowShiftModal(false)} className="px-3 py-1.5 text-sm font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors">Cancel</button>
                                        <button type="submit" className="px-3 py-1.5 text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-sm transition-colors">Apply Shift</button>
                                    </div>
                                </form>
                            </div>
                        )
                    }

                    {/* --- HOLIDAYS MODAL --- */}
                    {
                        showHolidaysModal && (
                            <div className="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
                                <div className="bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all flex flex-col max-h-[80vh]">
                                    <div className="px-5 py-4 border-b border-slate-100 dark:border-slate-700 flex items-center justify-between">
                                        <h2 className="text-base font-bold text-slate-800 dark:text-white flex items-center"><Flag className="w-5 h-5 mr-2 text-indigo-500" /> Project Holidays</h2>
                                        <button onClick={() => setShowHolidaysModal(false)} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 p-1 rounded-full"><X className="w-4 h-4" /></button>
                                    </div>
                                    <div className="p-5 flex-1 overflow-y-auto space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Add Blackout Date Range</label>
                                            <div className="flex flex-col space-y-2">
                                                <div className="flex space-x-2">
                                                    <input type="date" id="newHolidayStart" placeholder="Start Date" className="flex-1 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm font-medium focus:ring-2 focus:ring-indigo-500 text-slate-900 dark:text-slate-100 transition-colors" />
                                                    <input type="date" id="newHolidayEnd" placeholder="End Date" className="flex-1 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm font-medium focus:ring-2 focus:ring-indigo-500 text-slate-900 dark:text-slate-100 transition-colors" />
                                                </div>
                                                <button onClick={() => {
                                                    let startStr = document.getElementById('newHolidayStart').value;
                                                    let endStr = document.getElementById('newHolidayEnd').value;

                                                    if (!startStr && !endStr) return;
                                                    if (startStr && !endStr) endStr = startStr;
                                                    if (!startStr && endStr) startStr = endStr;

                                                    if (startStr > endStr) {
                                                        const tmp = startStr;
                                                        startStr = endStr;
                                                        endStr = tmp;
                                                    }

                                                    const rangeEntry = { start: startStr, end: endStr };

                                                    setProjects(prev => prev.map(p => {
                                                        if (p.id !== activeProjectId) return p;

                                                        // Duplicate check
                                                        const exists = (p.customHolidays || []).some(h => {
                                                            if (typeof h === 'string') return h === startStr && h === endStr;
                                                            return h.start === startStr && h.end === endStr;
                                                        });

                                                        if (exists) return p;

                                                        return { ...p, customHolidays: [...(p.customHolidays || []), rangeEntry].sort((a, b) => (a.start || a).localeCompare(b.start || b)) };
                                                    }));
                                                    document.getElementById('newHolidayStart').value = '';
                                                    document.getElementById('newHolidayEnd').value = '';
                                                }} className="w-full px-3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg flex items-center justify-center transition-colors"><Plus className="w-4 h-4 mr-2" /> Add Range</button>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Custom Holidays</label>
                                            <div className="space-y-2">
                                                {(!activeProject.customHolidays || activeProject.customHolidays.length === 0) && (
                                                    <div className="text-sm text-slate-500 italic">No custom holidays added.</div>
                                                )}
                                                {activeProject.customHolidays?.map((d, index) => {
                                                    const isRange = typeof d !== 'string';
                                                    const startStr = isRange ? d.start : d;
                                                    const endStr = isRange ? d.end : d;
                                                    const label = startStr === endStr ? formatShortDate(startStr) : `${formatShortDate(startStr)} - ${formatShortDate(endStr)}`;

                                                    return (
                                                        <div key={`hol-${index}`} className="flex justify-between items-center bg-slate-50 dark:bg-slate-900/50 px-3 py-2 rounded-md border border-slate-100 dark:border-slate-700">
                                                            <span className="text-sm font-semibold text-slate-700 dark:text-slate-300">{label}</span>
                                                            <button onClick={() => {
                                                                setProjects(prev => prev.map(p => p.id === activeProjectId ? { ...p, customHolidays: [...(p.customHolidays || [])].filter((_, idx) => idx !== index) } : p));
                                                            }} className="text-rose-500 hover:text-rose-600 p-1 bg-rose-50 dark:bg-rose-900/20 rounded"><Trash2 className="w-3.5 h-3.5" /></button>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="px-5 py-3 border-t border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 flex justify-end space-x-2 transition-colors">
                                        <button onClick={() => {
                                            updateVersion(t => t); // force recalculation to update layout cleanly
                                            setShowHolidaysModal(false);
                                        }} className="px-4 py-1.5 text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-sm transition-colors">Done</button>
                                    </div>
                                </div>
                            </div>
                        )
                    }

                    {/* --- EXPORT MODAL --- */}
                    {
                        showExportModal && (
                            <div className="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all">
                                    <div className="px-6 py-4 border-b border-slate-100 dark:border-slate-700 flex items-center justify-between bg-slate-50/50 dark:bg-slate-800/50">
                                        <h2 className="text-lg font-bold text-slate-800 dark:text-white flex items-center"><Download className="w-5 h-5 mr-2 text-indigo-500" /> Export Options</h2>
                                        <button onClick={() => setShowExportModal(false)} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 p-1 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"><X className="w-5 h-5" /></button>
                                    </div>

                                    <div className="p-6 space-y-5 max-h-[70vh] overflow-y-auto">
                                        {/* Company Branding Section */}
                                        <div>
                                            <label className="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-3">Company Branding</label>
                                            <div className="space-y-3">
                                                {/* Logo Upload */}
                                                <div className="flex items-center space-x-3">
                                                    <div className="w-16 h-12 rounded-lg border-2 border-dashed border-slate-200 dark:border-slate-600 flex items-center justify-center overflow-hidden bg-slate-50 dark:bg-slate-900/50 flex-shrink-0">
                                                        {companyLogo ? (
                                                            <img src={companyLogo} className="w-full h-full object-contain" alt="Logo" />
                                                        ) : (
                                                            <Upload className="w-4 h-4 text-slate-300 dark:text-slate-600" />
                                                        )}
                                                    </div>
                                                    <div className="flex-1">
                                                        <button onClick={() => {
                                                            const inp = document.createElement('input');
                                                            inp.type = 'file'; inp.accept = 'image/png,image/jpeg,image/svg+xml';
                                                            inp.onchange = (e) => {
                                                                const file = e.target.files[0]; if (!file) return;
                                                                const reader = new FileReader();
                                                                reader.onload = (ev) => setCompanyLogo(ev.target.result);
                                                                reader.readAsDataURL(file);
                                                            };
                                                            inp.click();
                                                        }} className="text-xs font-semibold text-indigo-600 dark:text-indigo-400 hover:text-indigo-700 dark:hover:text-indigo-300 transition-colors">
                                                            {companyLogo ? 'Change Logo' : 'Upload Logo'}
                                                        </button>
                                                        {companyLogo && (
                                                            <button onClick={() => setCompanyLogo('')} className="ml-3 text-xs font-semibold text-rose-500 hover:text-rose-600 transition-colors">Remove</button>
                                                        )}
                                                        <p className="text-[10px] text-slate-400 mt-0.5">PNG, JPG, or SVG</p>
                                                    </div>
                                                </div>
                                                {/* Company Name */}
                                                <input type="text" value={companyName} onChange={(e) => setCompanyName(e.target.value)} placeholder="Company Name" className="w-full px-3 py-2 text-sm font-medium rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200 placeholder-slate-400 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all" />
                                                {/* Footer Info */}
                                                <input type="text" value={companyFooter} onChange={(e) => setCompanyFooter(e.target.value)} placeholder="Address & Contact (e.g. 123 Main St | City, ST 00000 | (555) 555-0100)" className="w-full px-3 py-2 text-sm font-medium rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200 placeholder-slate-400 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all" />
                                                {/* Confidential Toggle */}
                                                <label className="flex items-center space-x-2 cursor-pointer group">
                                                    <input type="checkbox" checked={showConfidential} onChange={(e) => setShowConfidential(e.target.checked)} className="custom-checkbox w-4 h-4" />
                                                    <span className="text-xs font-semibold text-slate-500 dark:text-slate-400 group-hover:text-slate-700 dark:group-hover:text-slate-200 transition-colors">Show "CONFIDENTIAL" on exports</span>
                                                </label>
                                            </div>
                                        </div>

                                        {/* Paper Size */}
                                        <div>
                                            <label className="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">Paper Size</label>
                                            <div className="flex space-x-2">
                                                {[{ id: 'letter', label: 'Letter' }, { id: 'tabloid', label: 'Tabloid' }, { id: 'a4', label: 'A4' }, { id: 'a3', label: 'A3' }].map(sz => (
                                                    <button key={sz.id} onClick={() => setPdfPaperSize(sz.id)} className={`flex-1 px-3 py-1.5 rounded-lg text-xs font-bold transition-all border ${pdfPaperSize === sz.id ? 'bg-indigo-50 dark:bg-indigo-900/30 border-indigo-200 dark:border-indigo-800 text-indigo-700 dark:text-indigo-300 shadow-sm' : 'bg-white dark:bg-slate-700 border-slate-200 dark:border-slate-600 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-600'}`}>
                                                        {sz.label}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Divider */}
                                        <div className="h-px bg-slate-100 dark:bg-slate-700"></div>

                                        {/* Export Formats */}
                                        <div>
                                            <label className="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">Export Formats</label>
                                            <div className="space-y-2">
                                                <button onClick={exportPDF} disabled={isExporting} className="w-full flex items-center justify-between px-4 py-3 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-200 font-bold text-sm rounded-lg hover:bg-slate-50 dark:hover:bg-slate-600 shadow-sm transition-all group disabled:opacity-50">
                                                    <div className="flex items-center">
                                                        {isExporting ? <Loader2 className="w-5 h-5 mr-3 text-indigo-500 animate-spin" /> : <FileText className="w-5 h-5 mr-3 text-slate-400 group-hover:text-indigo-500 transition-colors" />}
                                                        {layoutView === 'Timeline' ? 'Timeline PDF (Vector)' : 'Gantt Chart PDF (Vector)'}
                                                    </div>
                                                    <ChevronRight className="w-4 h-4 opacity-50" />
                                                </button>

                                                <button onClick={exportExcelGantt} className="w-full flex items-center justify-between px-4 py-3 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-200 font-bold text-sm rounded-lg hover:bg-slate-50 dark:hover:bg-slate-600 shadow-sm transition-all group">
                                                    <div className="flex items-center"><FileSpreadsheet className="w-5 h-5 mr-3 text-slate-400 group-hover:text-emerald-500 transition-colors" /> Excel (.xls) Gantt Data</div>
                                                    <ChevronRight className="w-4 h-4 opacity-50" />
                                                </button>

                                                <button onClick={exportCSV} className="w-full flex items-center justify-between px-4 py-3 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-200 font-bold text-sm rounded-lg hover:bg-slate-50 dark:hover:bg-slate-600 shadow-sm transition-all group">
                                                    <div className="flex items-center"><FileSpreadsheet className="w-5 h-5 mr-3 text-slate-400 group-hover:text-emerald-500 transition-colors" /> Simple CSV Data</div>
                                                    <ChevronRight className="w-4 h-4 opacity-50" />
                                                </button>

                                                <button onClick={exportMilestoneICS} className="w-full flex items-center justify-between px-4 py-3 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-200 font-bold text-sm rounded-lg hover:bg-slate-50 dark:hover:bg-slate-600 shadow-sm transition-all group">
                                                    <div className="flex items-center"><Calendar className="w-5 h-5 mr-3 text-slate-400 group-hover:text-amber-500 transition-colors" /> Export Milestones to Outlook (.ics)</div>
                                                    <ChevronRight className="w-4 h-4 opacity-50" />
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )
                    }

                    {/* --- VIEW SETTINGS MODAL --- */}
                    {
                        showViewModal && (
                            <div className="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
                                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
                                    <div className="px-6 py-4 border-b border-slate-100 dark:border-slate-700 flex items-center justify-between bg-slate-50/50 dark:bg-slate-800/50">
                                        <h2 className="text-lg font-bold text-slate-800 dark:text-white flex items-center"><Eye className="w-5 h-5 mr-2 text-indigo-500" /> View Settings</h2>
                                        <button onClick={() => setShowViewModal(false)} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 p-1 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"><X className="w-5 h-5" /></button>
                                    </div>

                                    <div className="p-6 space-y-6">
                                        {/* Row Height */}
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Row Height</label>
                                            <div className="flex items-center space-x-3">
                                                <span className="text-xs font-semibold text-slate-400 w-6">22</span>
                                                <input type="range" min="22" max="44" value={rowHeight} onChange={(e) => setRowHeight(parseInt(e.target.value))} className="flex-1 accent-indigo-500 h-2 rounded-full cursor-pointer" />
                                                <span className="text-xs font-semibold text-slate-400 w-6">44</span>
                                                <div className="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 text-xs font-bold px-2.5 py-1 rounded-md min-w-[42px] text-center">{rowHeight}px</div>
                                            </div>
                                        </div>

                                        {/* Text Size */}
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Text Size</label>
                                            <div className="flex items-center space-x-3">
                                                <span className="text-xs font-semibold text-slate-400 w-6">10</span>
                                                <input type="range" min="10" max="16" value={textSize} onChange={(e) => setTextSize(parseInt(e.target.value))} className="flex-1 accent-indigo-500 h-2 rounded-full cursor-pointer" />
                                                <span className="text-xs font-semibold text-slate-400 w-6">16</span>
                                                <div className="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 text-xs font-bold px-2.5 py-1 rounded-md min-w-[42px] text-center">{textSize}px</div>
                                            </div>
                                        </div>

                                        {/* Column Visibility */}
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Column Visibility</label>
                                            <div className="grid grid-cols-2 gap-2">
                                                {columnOrder.filter(c => c !== 'name').map(colKey => {
                                                    const labels = { phasePercentage: 'Phase %', party: 'Party', duration: 'Duration', start: 'Start Date', end: 'End Date' };
                                                    return (
                                                        <button key={colKey} onClick={() => setColumnVisibility(prev => ({ ...prev, [colKey]: !prev[colKey] }))}
                                                            className={`flex items-center justify-between px-3 py-2 rounded-lg text-xs font-bold transition-all border shadow-sm ${columnVisibility[colKey] ? 'bg-indigo-50 dark:bg-indigo-900/30 border-indigo-200 dark:border-indigo-800 text-indigo-700 dark:text-indigo-300' : 'bg-slate-50 dark:bg-slate-700 border-slate-200 dark:border-slate-700 text-slate-400 dark:text-slate-500'}`}>
                                                            <span>{labels[colKey]}</span>
                                                            {columnVisibility[colKey] ? <Eye className="w-3.5 h-3.5" /> : <X className="w-3.5 h-3.5" />}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        {/* PDF Paper Size */}
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">PDF Paper Size</label>
                                            <div className="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-lg border border-slate-200 dark:border-slate-700 shadow-inner">
                                                <button onClick={() => setPdfPaperSize('letter')} className={`flex-1 py-2 text-xs font-bold rounded-md transition-all ${pdfPaperSize === 'letter' ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-indigo-400 shadow-sm' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300'}`}>
                                                    Letter <span className="text-[10px] font-normal opacity-60">(8.5×11")</span>
                                                </button>
                                                <button onClick={() => setPdfPaperSize('tabloid')} className={`flex-1 py-2 text-xs font-bold rounded-md transition-all ${pdfPaperSize === 'tabloid' ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-indigo-400 shadow-sm' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300'}`}>
                                                    Tabloid <span className="text-[10px] font-normal opacity-60">(11×17")</span>
                                                </button>
                                            </div>
                                        </div>

                                        {/* Critical Path Toggle */}
                                        <div className="pt-2 border-t border-slate-100 dark:border-slate-700">
                                            <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Project Analysis</label>
                                            <button
                                                onClick={() => setShowCriticalPath(!showCriticalPath)}
                                                className={`w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm font-bold transition-all border shadow-sm ${showCriticalPath ? 'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800 text-red-700 dark:text-red-400' : 'bg-slate-50 dark:bg-slate-700 border-slate-200 dark:border-slate-600 text-slate-500'}`}
                                            >
                                                <div className="flex items-center">
                                                    <Flag className={`w-4 h-4 mr-2 ${showCriticalPath ? 'text-red-500' : 'text-slate-400'}`} />
                                                    <span>Highlight Critical Path</span>
                                                </div>
                                                <div className={`w-10 h-5 rounded-full relative transition-colors ${showCriticalPath ? 'bg-red-500' : 'bg-slate-300 dark:bg-slate-600'}`}>
                                                    <div className={`absolute top-1 left-1 w-3 h-3 bg-white rounded-full transition-transform ${showCriticalPath ? 'translate-x-5' : ''}`} />
                                                </div>
                                            </button>
                                            <p className="text-[10px] text-slate-400 mt-2 italic px-1 leading-tight">Specifically identifies tasks that, if delayed, will delay the entire project completion date.</p>
                                        </div>

                                        {/* Dashboard Toggle */}
                                        <div className="pt-2 border-t border-slate-100 dark:border-slate-700">
                                            <button
                                                onClick={() => setShowDashboard(!showDashboard)}
                                                className={`w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm font-bold transition-all border shadow-sm ${showDashboard ? 'bg-indigo-50 dark:bg-indigo-900/20 border-indigo-200 dark:border-indigo-800 text-indigo-700 dark:text-indigo-400' : 'bg-slate-50 dark:bg-slate-700 border-slate-200 dark:border-slate-600 text-slate-500'}`}
                                            >
                                                <div className="flex items-center">
                                                    <Clock className={`w-4 h-4 mr-2 ${showDashboard ? 'text-indigo-500' : 'text-slate-400'}`} />
                                                    <span>Show Schedule Health Dashboard</span>
                                                </div>
                                                <div className={`w-10 h-5 rounded-full relative transition-colors ${showDashboard ? 'bg-indigo-500' : 'bg-slate-300 dark:bg-slate-600'}`}>
                                                    <div className={`absolute top-1 left-1 w-3 h-3 bg-white rounded-full transition-transform ${showDashboard ? 'translate-x-5' : ''}`} />
                                                </div>
                                            </button>
                                        </div>

                                    </div>

                                    <div className="px-6 py-3 border-t border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 flex justify-end">
                                        <button onClick={() => setShowViewModal(false)} className="px-4 py-1.5 text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-sm transition-colors">Done</button>
                                    </div>
                                </div>
                            </div>
                        )
                    }

                    {/* --- CONTEXT MENU --- */}
                    {
                        contextMenu && (
                            <div className="fixed bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-xl rounded-md py-1 z-[60] text-sm min-w-[180px]" style={{ left: contextMenu.x, top: contextMenu.y }} onClick={(e) => e.stopPropagation()}>
                                <button onClick={() => { colorTargetRef.current = contextMenu.taskId; if (colorInputRef.current) { colorInputRef.current.value = tasks.find(t => t.id === contextMenu.taskId)?.color || phaseColors[tasks.find(t => t.id === contextMenu.taskId)?.phase] || '#94a3b8'; colorInputRef.current.style.left = contextMenu.x + 'px'; colorInputRef.current.style.top = contextMenu.y + 'px'; colorInputRef.current.click(); } setContextMenu(null); }} className="w-full text-left px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-semibold flex items-center cursor-pointer">
                                    <div className="w-4 h-4 rounded-full border border-slate-300 dark:border-slate-600 mr-2 shadow-inner flex-shrink-0" style={{ backgroundColor: tasks.find(t => t.id === contextMenu.taskId)?.color || phaseColors[tasks.find(t => t.id === contextMenu.taskId)?.phase] || '#94a3b8' }} />
                                    Bar Color
                                </button>
                                {tasks.find(t => t.id === contextMenu.taskId)?.color && (
                                    <button onClick={() => { handleTaskChange(contextMenu.taskId, 'color', null); setContextMenu(null); }} className="w-full text-left px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 font-semibold flex items-center cursor-pointer text-xs">
                                        <X className="w-3.5 h-3.5 mr-2" /> Reset Bar Color
                                    </button>
                                )}
                                <button onClick={() => { cycleMilestone(contextMenu.taskId); setContextMenu(null); }} className="w-full text-left px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-semibold flex items-center">
                                    <Flag className="w-4 h-4 mr-2 text-indigo-500" /> Toggle Milestone
                                </button>
                                {tasks.find(t => t.id === contextMenu.taskId)?.milestone > 0 && layoutView === 'Timeline' && (
                                    <button onClick={() => {
                                        const t = tasks.find(tsk => tsk.id === contextMenu.taskId);
                                        const currentAlign = t?.labelAlign || 'center';
                                        const nextAlign = currentAlign === 'center' ? 'left' : (currentAlign === 'left' ? 'right' : 'center');
                                        handleTaskChange(contextMenu.taskId, 'labelAlign', nextAlign);
                                        setContextMenu(null);
                                    }} className="w-full text-left px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-semibold flex items-center">
                                        <AlignLeft className="w-4 h-4 mr-2 text-slate-500" /> Toggle Label Alignment
                                    </button>
                                )}
                                <div className="h-px bg-slate-100 dark:bg-slate-700 my-1" />
                                <button onClick={() => { duplicateTask(contextMenu.taskId); setContextMenu(null); }} className="w-full text-left px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-semibold flex items-center">
                                    <Copy className="w-4 h-4 mr-2 text-indigo-400" /> Duplicate Task
                                </button>
                                <button onClick={(e) => {
                                    const task = tasks.find(t => t.id === contextMenu.taskId);
                                    setNotesPopover({ taskId: contextMenu.taskId, notes: task?.notes || '' });
                                    setContextMenu(null);
                                }} className="w-full text-left px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-semibold flex items-center">
                                    <Icon name="StickyNote" className="w-4 h-4 mr-2 text-amber-500" fallback={<span className="w-4 h-4 mr-2 text-amber-500 text-xs font-bold">📝</span>} /> Edit Notes
                                </button>
                                <div className="h-px bg-slate-100 dark:bg-slate-700 my-1" />
                                <button onClick={() => { deleteTask(contextMenu.taskId); setContextMenu(null); }} className="w-full text-left px-4 py-2 hover:bg-rose-50 dark:hover:bg-rose-900/30 text-rose-600 dark:text-rose-400 font-semibold flex items-center transition-colors">
                                    <Trash2 className="w-4 h-4 mr-2" /> Delete Task
                                </button>
                            </div>
                        )
                    }

                    {/* --- NOTES POPOVER --- */}
                    {
                        notesPopover && (
                            <div className="fixed inset-0 bg-slate-900/30 dark:bg-black/50 backdrop-blur-sm flex items-center justify-center z-[60] p-4" onClick={() => setNotesPopover(null)}>
                                <div className="notes-popover bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-md overflow-hidden" onClick={e => e.stopPropagation()}>
                                    <div className="px-5 py-4 border-b border-slate-100 dark:border-slate-700 flex items-center justify-between">
                                        <h2 className="text-base font-bold text-slate-800 dark:text-white flex items-center">
                                            <span className="mr-2 text-amber-500">📝</span>
                                            Task Notes
                                            <span className="ml-2 text-sm font-normal text-slate-400 truncate max-w-[180px]">
                                                — {tasks.find(t => t.id === notesPopover.taskId)?.name}
                                            </span>
                                        </h2>
                                        <button onClick={() => setNotesPopover(null)} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
                                            <X className="w-4 h-4" />
                                        </button>
                                    </div>
                                    <div className="p-5">
                                        <textarea
                                            autoFocus
                                            rows={6}
                                            value={notesPopover.notes}
                                            onChange={e => setNotesPopover(prev => ({ ...prev, notes: e.target.value }))}
                                            placeholder="Add notes, assumptions, scope items, or action items for this task..."
                                            className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm font-medium focus:ring-2 focus:ring-indigo-500 focus:outline-none text-slate-800 dark:text-slate-100 resize-none transition-colors"
                                        />
                                        <p className="text-[10px] text-slate-400 mt-2">Notes appear as a tooltip on the task row and are saved with your project.</p>
                                    </div>
                                    <div className="px-5 py-3 border-t border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 flex justify-end space-x-2">
                                        <button onClick={() => setNotesPopover(null)} className="px-3 py-1.5 text-sm font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-md">Cancel</button>
                                        <button onClick={() => { handleTaskNoteChange(notesPopover.taskId, notesPopover.notes.trim()); setNotesPopover(null); }} className="px-3 py-1.5 text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 rounded-md">Save Notes</button>
                                    </div>
                                </div>
                            </div>
                        )
                    }

                    {/* --- BULK ACTION BAR --- */}
                    {selectedTaskIds.size > 0 && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900/90 dark:bg-slate-800/95 backdrop-blur-md text-white px-6 py-4 rounded-2xl shadow-2xl z-[100] border border-slate-700/50 flex items-center space-x-6 animate-in slide-in-from-bottom-6 duration-300">
                            <div className="flex items-center space-x-3 pr-6 border-r border-slate-700/50">
                                <div className="bg-indigo-600 text-[10px] font-black w-6 h-6 rounded-full flex items-center justify-center shadow-lg shadow-indigo-500/20">{selectedTaskIds.size}</div>
                                <span className="text-sm font-bold text-slate-200 tracking-tight">Tasks Selected</span>
                            </div>

                            <div className="flex items-center space-x-2">
                                <button onClick={handleBulkDelete} className="flex items-center space-x-2 px-4 py-2 hover:bg-rose-500/20 text-rose-400 hover:text-rose-300 rounded-xl transition-all font-bold text-sm">
                                    <Trash2 className="w-4 h-4" /> <span>Delete</span>
                                </button>

                                <button onClick={() => { setShiftTarget('Selected'); setShowShiftModal(true); }} className="flex items-center space-x-2 px-4 py-2 hover:bg-white/10 text-slate-200 rounded-xl transition-all font-bold text-sm">
                                    <CalendarDays className="w-4 h-4 text-indigo-400" /> <span>Shift</span>
                                </button>

                                <div className="relative group/party">
                                    <button className="flex items-center space-x-2 px-4 py-2 hover:bg-white/10 text-slate-200 rounded-xl transition-all font-bold text-sm">
                                        <Users2 className="w-4 h-4 text-emerald-400" /> <span>Assign Party</span>
                                    </button>
                                    <div className="absolute bottom-full mb-3 left-1/2 -translate-x-1/2 w-56 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-2xl opacity-0 invisible group-hover/party:opacity-100 group-hover/party:visible transition-all p-2 z-[110] transform origin-bottom scale-95 group-hover/party:scale-100">
                                        <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 px-2 py-1 border-b border-slate-50 dark:border-slate-700">Assign Party To All</div>
                                        <div className="max-h-48 overflow-y-auto no-scrollbar">
                                            {(activeProject.parties || DEFAULT_PARTIES).map(p => (
                                                <button key={p} onClick={() => handleBulkPartyUpdate(p)} className="w-full text-left px-3 py-2 text-xs font-bold text-slate-700 dark:text-slate-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/40 hover:text-indigo-600 rounded-lg transition-colors">{p}</button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <button onClick={() => setSelectedTaskIds(new Set())} className="p-2 text-slate-400 hover:text-white transition-colors ml-2 bg-white/5 hover:bg-white/10 rounded-full" title="Deselect All"><X className="w-4 h-4" /></button>
                        </div>
                    )}

                    {/* --- TASK NOTES TOOLTIP --- */}
                    {tooltipTask && tooltipTask.notes && (
                        <div
                            className="fixed z-[100] pointer-events-none transition-opacity duration-200"
                            style={{
                                left: `${tooltipPosition.x + 15}px`,
                                top: `${tooltipPosition.y + 15}px`,
                                maxWidth: '300px'
                            }}
                        >
                            <div className="bg-white/95 dark:bg-slate-800/95 backdrop-blur-md border border-slate-200 dark:border-slate-700 shadow-2xl rounded-xl p-4 animate-in fade-in zoom-in-95 duration-200">
                                <div className="flex items-start space-x-3">
                                    <div className="mt-0.5 p-1.5 bg-amber-100 dark:bg-amber-900/40 rounded-lg">
                                        <Icon name="StickyNote" className="w-4 h-4 text-amber-600 dark:text-amber-400" fallback={<span className="text-xs">📝</span>} />
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <div className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1">Task Note</div>
                                        <div className="text-sm font-bold text-slate-800 dark:text-slate-100 mb-1 truncate">{tooltipTask.name}</div>
                                        <div className="text-xs text-slate-600 dark:text-slate-300 leading-relaxed break-words whitespace-pre-wrap">{tooltipTask.notes}</div>
                                    </div>
                                </div>
                                <div className="mt-3 pt-2 border-t border-slate-100 dark:border-slate-700/50 flex items-center justify-between">
                                    <div className="text-[9px] font-medium text-slate-400">ArchiSchedule Notes</div>
                                    <div className="w-1.5 h-1.5 rounded-full bg-amber-400 animate-pulse" />
                                </div>
                            </div>
                        </div>
                    )}

                </div >
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
